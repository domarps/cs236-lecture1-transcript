utu.be/XZ0PMRWXBEU?t=1885s", "text": "So you have, and this basically is machine translation, right?"}, {"index": 336, "start": 1890.0, "end": 1892.0, "timestamp": "31:30", "endTimestamp": "31:32", "url": "https://youtu.be/XZ0PMRWXBEU?t=1890s", "text": "So progress is in generative models."}, {"index": 337, "start": 1892.0, "end": 1896.0, "timestamp": "31:32", "endTimestamp": "31:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=1892s", "text": "Basically directly translated to progress in machine translation."}, {"index": 338, "start": 1896.0, "end": 1901.0, "timestamp": "31:36", "endTimestamp": "31:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=1896s", "text": "If you have a model that really understands how to generate text in English,"}, {"index": 339, "start": 1901.0, "end": 1905.0, "timestamp": "31:41", "endTimestamp": "31:45", "url": "https://youtu.be/XZ0PMRWXBEU?t=1901s", "text": "then it can take advantage of the control signal well."}, {"index": 340, "start": 1905.0, "end": 1910.0, "timestamp": "31:45", "endTimestamp": "31:50", "url": "https://youtu.be/XZ0PMRWXBEU?t=1905s", "text": "Then it means that essentially it's able to do the retranslation reasonably well."}, {"index": 341, "start": 1910.0, "end": 1916.0, "timestamp": "31:50", "endTimestamp": "31:56", "url": "https://youtu.be/XZ0PMRWXBEU?t=1910s", "text": "And a lot of the progress in terms of like the models and the architectures that we're going to talk about in this class"}, {"index": 342, "start": 1916.0, "end": 1923.0, "timestamp": "31:56", "endTimestamp": "32:03", "url": "https://youtu.be/XZ0PMRWXBEU?t=1916s", "text": "are the kind of ideas that are behind the pretty good machine translation systems that we have today."}, {"index": 343, "start": 1923.0, "end": 1928.0, "timestamp": "32:03", "endTimestamp": "32:08", "url": "https://youtu.be/XZ0PMRWXBEU?t=1923s", "text": "Another example is code."}, {"index": 344, "start": 1928.0, "end": 1931.0, "timestamp": "32:08", "endTimestamp": "32:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=1928s", "text": "Of course, very exciting as it's computer science."}, {"index": 345, "start": 1931.0, "end": 1934.0, "timestamp": "32:11", "endTimestamp": "32:14", "url": "https://youtu.be/XZ0PMRWXBEU?t=1931s", "text": "Many of you are computer scientists, so write a lot of code."}, {"index": 346, "start": 1934.0, "end": 1937.0, "timestamp": "32:14", "endTimestamp": "32:17", "url": "https://youtu.be/XZ0PMRWXBEU?t=1934s", "text": "At the end of the day, code is text."}, {"index": 347, "start": 1937.0, "end": 1944.0, "timestamp": "32:17", "endTimestamp": "32:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=1937s", "text": "If you have a model that understands which sequences of text make sense and which ones don't,"}, {"index": 348, "start": 1944.0, "end": 1947.0, "timestamp": "32:24", "endTimestamp": "32:27", "url": "https://youtu.be/XZ0PMRWXBEU?t=1944s", "text": "you can use it to write code for you."}, {"index": 349, "start": 1947.0, "end": 1953.0, "timestamp": "32:27", "endTimestamp": "32:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=1947s", "text": "So here's an example of a system that exists today where you're kind of like creating a code."}, {"index": 350, "start": 1953.0, "end": 1962.0, "timestamp": "32:33", "endTimestamp": "32:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=1953s", "text": "You can try to get the model to autocomplete, let's say, the body of a function based on some description of what the function is supposed to do."}, {"index": 351, "start": 1962.0, "end": 1969.0, "timestamp": "32:42", "endTimestamp": "32:49", "url": "https://youtu.be/XZ0PMRWXBEU?t=1962s", "text": "Again, these systems are not perfect, but they are already pretty good."}, {"index": 352, "start": 1969.0, "end": 1974.0, "timestamp": "32:49", "endTimestamp": "32:54", "url": "https://youtu.be/XZ0PMRWXBEU?t=1969s", "text": "They can solve many interesting tasks."}, {"index": 353, "start": 1974.0, "end": 1979.0, "timestamp": "32:54", "endTimestamp": "32:59", "url": "https://youtu.be/XZ0PMRWXBEU?t=1974s", "text": "They can solve programming assignments."}, {"index": 354, "start": 1979.0, "end": 1981.0, "timestamp": "32:59", "endTimestamp": "33:01", "url": "https://youtu.be/XZ0PMRWXBEU?t=1979s", "text": "They can solve competition."}, {"index": 355, "start": 1981.0, "end": 1987.0, "timestamp": "33:01", "endTimestamp": "33:07", "url": "https://youtu.be/XZ0PMRWXBEU?t=1981s", "text": "They do reasonably well in competitive programming competitions."}, {"index": 356, "start": 1987.0, "end": 1993.0, "timestamp": "33:07", "endTimestamp": "33:13", "url": "https://youtu.be/XZ0PMRWXBEU?t=1987s", "text": "So, again, pretty cool that they understand the natural language."}, {"index": 357, "start": 1993.0, "end": 1995.0, "timestamp": "33:13", "endTimestamp": "33:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=1993s", "text": "They understand the syntax of the programming language."}, {"index": 358, "start": 1995.0, "end": 1999.0, "timestamp": "33:15", "endTimestamp": "33:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=1995s", "text": "They know how to put things together so that they do the right thing."}, {"index": 359, "start": 1999.0, "end": 2003.0, "timestamp": "33:19", "endTimestamp": "33:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=1999s", "text": "They're sort of able to translate, in this case, from natural language to a formal language,"}, {"index": 360, "start": 2003.0, "end": 2008.0, "timestamp": "33:23", "endTimestamp": "33:28", "url": "https://youtu.be/XZ0PMRWXBEU?t=2003s", "text": "and Python in this case, and do the right thing."}, {"index": 361, "start": 2008.0, "end": 2016.0, "timestamp": "33:28", "endTimestamp": "33:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=2008s", "text": "So lots of excitement also around these sort of models."}, {"index": 362, "start": 2016.0, "end": 2019.0, "timestamp": "33:36", "endTimestamp": "33:39", "url": "https://youtu.be/XZ0PMRWXBEU?t=2016s", "text": "Another one that is pretty cool is video."}, {"index": 363, "start": 2019.0, "end": 2025.0, "timestamp": "33:39", "endTimestamp": "33:45", "url": "https://youtu.be/XZ0PMRWXBEU?t=2019s", "text": "This is one of the active ones where the first systems are being built."}, {"index": 364, "start": 2025.0, "end": 2033.0, "timestamp": "33:45", "endTimestamp": "33:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=2025s", "text": "Again, you can imagine a variety of different interfaces where you can control the generative process through many different things."}, {"index": 365, "start": 2033.0, "end": 2035.0, "timestamp": "33:53", "endTimestamp": "33:55", "url": "https://youtu.be/XZ0PMRWXBEU?t=2033s", "text": "A natural one is text."}, {"index": 366, "start": 2035.0, "end": 2047.0, "timestamp": "33:55", "endTimestamp": "34:07", "url": "https://youtu.be/XZ0PMRWXBEU?t=2035s", "text": "You might say you start with a caption, and then you ask the model to generate a video corresponding to that caption."}, {"index": 367, "start": 2047.0, "end": 2049.0, "timestamp": "34:07", "endTimestamp": "34:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=2047s", "text": "This is one example."}, {"index": 368, "start": 2049.0, "end": 2051.0, "timestamp": "34:09", "endTimestamp": "34:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=2049s", "text": "The videos are pretty short right now."}, {"index": 369, "start": 2051.0, "end": 2053.0, "timestamp": "34:11", "endTimestamp": "34:13", "url": "https://youtu.be/XZ0PMRWXBEU?t=2051s", "text": "That's one of the limitations."}, {"index": 370, "start": 2053.0, "end": 2056.0, "timestamp": "34:13", "endTimestamp": "34:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=2053s", "text": "But can you see it?"}, {"index": 371, "start": 2056.0, "end": 2058.0, "timestamp": "34:16", "endTimestamp": "34:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=2056s", "text": "Oh, yeah, it shows up there."}, {"index": 372, "start": 2058.0, "end": 2061.0, "timestamp": "34:18", "endTimestamp": "34:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=2058s", "text": "Here's another example."}, {"index": 373, "start": 2061.0, "end": 2070.0, "timestamp": "34:21", "endTimestamp": "34:30", "url": "https://youtu.be/XZ0PMRWXBEU?t=2061s", "text": "Here they're asking it to generate a video of a couple sledding down a snowy hill on the Roman Church's style."}, {"index": 374, "start": 2070.0, "end": 2074.0, "timestamp": "34:30", "endTimestamp": "34:34", "url": "https://youtu.be/XZ0PMRWXBEU?t=2070s", "text": "And this is sort of like what it produces."}, {"index": 375, "start": 2074.0, "end": 2077.0, "timestamp": "34:34", "endTimestamp": "34:37", "url": "https://youtu.be/XZ0PMRWXBEU?t=2074s", "text": "Pretty short videos."}, {"index": 376, "start": 2077.0, "end": 2081.0, "timestamp": "34:37", "endTimestamp": "34:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=2077s", "text": "At the end of the day, you kind of think of a video as a sequence of images."}, {"index": 377, "start": 2081.0, "end": 2089.0, "timestamp": "34:41", "endTimestamp": "34:49", "url": "https://youtu.be/XZ0PMRWXBEU?t=2081s", "text": "So if you can generate images, it's believable that you can also generate a stack of images, which is essentially a video."}, {"index": 378, "start": 2089.0, "end": 2091.0, "timestamp": "34:49", "endTimestamp": "34:51", "url": "https://youtu.be/XZ0PMRWXBEU?t=2089s", "text": "Pretty impressive."}, {"index": 379, "start": 2091.0, "end": 2095.0, "timestamp": "34:51", "endTimestamp": "34:55", "url": "https://youtu.be/XZ0PMRWXBEU?t=2091s", "text": "There's a good amount of coherence across the frames."}, {"index": 380, "start": 2095.0, "end": 2098.0, "timestamp": "34:55", "endTimestamp": "34:58", "url": "https://youtu.be/XZ0PMRWXBEU?t=2095s", "text": "It captures roughly what's asked by the user."}, {"index": 381, "start": 2098.0, "end": 2101.0, "timestamp": "34:58", "endTimestamp": "35:01", "url": "https://youtu.be/XZ0PMRWXBEU?t=2098s", "text": "And the quality is pretty high."}, {"index": 382, "start": 2101.0, "end": 2109.0, "timestamp": "35:01", "endTimestamp": "35:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=2101s", "text": "And if you're willing to work on this and stitch together many different videos, you can generate some pretty cool stuff."}, {"index": 383, "start": 2109.0, "end": 2111.0, "timestamp": "35:09", "endTimestamp": "35:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=2109s", "text": "That's the example."}, {"index": 384, "start": 2111.0, "end": 2112.0, "timestamp": "35:11", "endTimestamp": "35:12", "url": "https://youtu.be/XZ0PMRWXBEU?t=2111s", "text": "That's the example."}, {"index": 385, "start": 2112.0, "end": 2114.0, "timestamp": "35:12", "endTimestamp": "35:14", "url": "https://youtu.be/XZ0PMRWXBEU?t=2112s", "text": "That's the example."}, {"index": 386, "start": 2114.0, "end": 2117.0, "timestamp": "35:14", "endTimestamp": "35:17", "url": "https://youtu.be/XZ0PMRWXBEU?t=2114s", "text": "languages."}, {"index": 387, "start": 2120.0, "end": 2122.0, "timestamp": "35:20", "endTimestamp": "35:22", "url": "https://youtu.be/XZ0PMRWXBEU?t=2120s", "text": "l"}, {"index": 388, "start": 2144.0, "end": 2154.3, "timestamp": "35:44", "endTimestamp": "35:54", "url": "https://youtu.be/XZ0PMRWXBEU?t=2144s", "text": "This is just basically stitching together a bunch of videos generated with the previous system."}, {"index": 389, "start": 2155.44, "end": 2162.0, "timestamp": "35:55", "endTimestamp": "36:02", "url": "https://youtu.be/XZ0PMRWXBEU?t=2155s", "text": "And, you know, again, you can see it's not perfect, but it's remarkable."}, {"index": 390, "start": 2162.3, "end": 2167.74, "timestamp": "36:02", "endTimestamp": "36:08", "url": "https://youtu.be/XZ0PMRWXBEU?t=2162s", "text": "I mean, we're not at the level where you can just ask the system to produce a movie for you"}, {"index": 391, "start": 2167.74, "end": 2171.12, "timestamp": "36:08", "endTimestamp": "36:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=2167s", "text": "with a certain plot or whatever, with your favorite actor,"}, {"index": 392, "start": 2171.12, "end": 2177.6, "timestamp": "36:11", "endTimestamp": "36:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=2171s", "text": "but it's already able to produce pretty high-quality content that people are willing to look at and engage with."}, {"index": 393, "start": 2178.2999999999997, "end": 2183.7, "timestamp": "36:18", "endTimestamp": "36:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=2178s", "text": "So that's an exciting kind of development that we're seeing in generative models of videos."}, {"index": 394, "start": 2183.8199999999997, "end": 2189.52, "timestamp": "36:24", "endTimestamp": "36:30", "url": "https://youtu.be/XZ0PMRWXBEU?t=2183s", "text": "I think when that starts to work, and we're seeing the kind of progress in this space that I showed you before for images,"}, {"index": 395, "start": 2189.98, "end": 2191.2, "timestamp": "36:30", "endTimestamp": "36:31", "url": "https://youtu.be/XZ0PMRWXBEU?t=2189s", "text": "it's happening right now."}, {"index": 396, "start": 2191.46, "end": 2197.2999999999997, "timestamp": "36:31", "endTimestamp": "36:37", "url": "https://youtu.be/XZ0PMRWXBEU?t=2191s", "text": "I think when people figure this out and get really good systems, they can generate long videos of high quality."}, {"index": 397, "start": 2197.3, "end": 2208.5800000000004, "timestamp": "36:37", "endTimestamp": "36:49", "url": "https://youtu.be/XZ0PMRWXBEU?t=2197s", "text": "This could be really changing the way we, you know, a lot of the media industry is going to have to pay attention to this."}, {"index": 398, "start": 2210.96, "end": 2211.78, "timestamp": "36:51", "endTimestamp": "36:52", "url": "https://youtu.be/XZ0PMRWXBEU?t=2210s", "text": "Question? Yeah."}, {"index": 399, "start": 2212.52, "end": 2212.7000000000003, "timestamp": "36:53", "endTimestamp": "36:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=2212s", "text": "Yeah."}, {"index": 400, "start": 2212.7000000000003, "end": 2213.0800000000004, "timestamp": "36:53", "endTimestamp": "36:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=2212s", "text": "Yeah."}, {"index": 401, "start": 2213.0800000000004, "end": 2213.7000000000003, "timestamp": "36:53", "endTimestamp": "36:54", "url": "https://youtu.be/XZ0PMRWXBEU?t=2213s", "text": "Yeah."}, {"index": 402, "start": 2213.7, "end": 2215.22, "timestamp": "36:54", "endTimestamp": "36:55", "url": "https://youtu.be/XZ0PMRWXBEU?t=2213s", "text": "Yeah."}, {"index": 403, "start": 2215.22, "end": 2229.04, "timestamp": "36:55", "endTimestamp": "37:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=2215s", "text": "I feel like you have to give some intentings, like, you know, some hand sketches, because nowadays I would say this is the most impressive video generation."}, {"index": 404, "start": 2229.4199999999996, "end": 2230.6, "timestamp": "37:09", "endTimestamp": "37:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=2229s", "text": "Video ever, ever saying so."}, {"index": 405, "start": 2230.8799999999997, "end": 2232.08, "timestamp": "37:11", "endTimestamp": "37:12", "url": "https://youtu.be/XZ0PMRWXBEU?t=2230s", "text": "Because I would keep following this."}, {"index": 406, "start": 2232.3599999999997, "end": 2235.0, "timestamp": "37:12", "endTimestamp": "37:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=2232s", "text": "So it's, I mean, these ones are generated purely from the caption."}, {"index": 407, "start": 2235.3399999999997, "end": 2235.58, "timestamp": "37:15", "endTimestamp": "37:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=2235s", "text": "Okay."}, {"index": 408, "start": 2235.58, "end": 2239.68, "timestamp": "37:16", "endTimestamp": "37:20", "url": "https://youtu.be/XZ0PMRWXBEU?t=2235s", "text": "This one, I don't know exactly what went into this."}, {"index": 409, "start": 2240.06, "end": 2241.1, "timestamp": "37:20", "endTimestamp": "37:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=2240s", "text": "I didn't make it myself."}, {"index": 410, "start": 2242.06, "end": 2249.68, "timestamp": "37:22", "endTimestamp": "37:30", "url": "https://youtu.be/XZ0PMRWXBEU?t=2242s", "text": "But I know the system allows you to also control it through a caption and a seed image."}, {"index": 411, "start": 2250.4, "end": 2259.02, "timestamp": "37:30", "endTimestamp": "37:39", "url": "https://youtu.be/XZ0PMRWXBEU?t=2250s", "text": "So, you know, if you maybe already know what you want your character to look like, then you can kind of use it and animate, let's say, a given image."}, {"index": 412, "start": 2260.02, "end": 2264.6, "timestamp": "37:40", "endTimestamp": "37:45", "url": "https://youtu.be/XZ0PMRWXBEU?t=2260s", "text": "And again, it's an example of controlling the generative process."}, {"index": 413, "start": 2264.6, "end": 2266.52, "timestamp": "37:45", "endTimestamp": "37:47", "url": "https://youtu.be/XZ0PMRWXBEU?t=2264s", "text": "Like, you can control it through text."}, {"index": 414, "start": 2266.58, "end": 2267.66, "timestamp": "37:47", "endTimestamp": "37:48", "url": "https://youtu.be/XZ0PMRWXBEU?t=2266s", "text": "You can control it through images."}, {"index": 415, "start": 2268.28, "end": 2270.24, "timestamp": "37:48", "endTimestamp": "37:50", "url": "https://youtu.be/XZ0PMRWXBEU?t=2268s", "text": "There are many different ways to do this."}, {"index": 416, "start": 2273.84, "end": 2274.28, "timestamp": "37:54", "endTimestamp": "37:54", "url": "https://youtu.be/XZ0PMRWXBEU?t=2273s", "text": "Yeah."}, {"index": 417, "start": 2274.38, "end": 2280.1, "timestamp": "37:54", "endTimestamp": "38:00", "url": "https://youtu.be/XZ0PMRWXBEU?t=2274s", "text": "And this is actually from a PhD student, a former PhD student in our group."}, {"index": 418, "start": 2280.44, "end": 2282.8, "timestamp": "38:00", "endTimestamp": "38:03", "url": "https://youtu.be/XZ0PMRWXBEU?t=2280s", "text": "So, yeah, it's a system that they are developing."}, {"index": 419, "start": 2283.04, "end": 2283.7599999999998, "timestamp": "38:03", "endTimestamp": "38:04", "url": "https://youtu.be/XZ0PMRWXBEU?t=2283s", "text": "It's very good."}, {"index": 420, "start": 2283.88, "end": 2284.52, "timestamp": "38:04", "endTimestamp": "38:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=2283s", "text": "I agree with you."}, {"index": 421, "start": 2286.38, "end": 2287.54, "timestamp": "38:06", "endTimestamp": "38:08", "url": "https://youtu.be/XZ0PMRWXBEU?t=2286s", "text": "Pretty impressive stuff."}, {"index": 422, "start": 2287.54, "end": 2292.86, "timestamp": "38:08", "endTimestamp": "38:13", "url": "https://youtu.be/XZ0PMRWXBEU?t=2287s", "text": "So that's the kind of thing you can do once you learn this material very well."}, {"index": 423, "start": 2294.54, "end": 2295.18, "timestamp": "38:15", "endTimestamp": "38:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=2294s", "text": "All right."}, {"index": 424, "start": 2295.24, "end": 2302.6, "timestamp": "38:15", "endTimestamp": "38:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=2295s", "text": "Other completely different sort of application area, sort of like decision-making, robotics."}, {"index": 425, "start": 2303.48, "end": 2312.02, "timestamp": "38:23", "endTimestamp": "38:32", "url": "https://youtu.be/XZ0PMRWXBEU?t=2303s", "text": "This kind of, a lot of these domains, what you care about is taking actions in the world to achieve a certain goal."}, {"index": 426, "start": 2312.14, "end": 2314.9, "timestamp": "38:32", "endTimestamp": "38:35", "url": "https://youtu.be/XZ0PMRWXBEU?t=2312s", "text": "Let's say driving a car or stacking some objects."}, {"index": 427, "start": 2314.9, "end": 2320.3, "timestamp": "38:35", "endTimestamp": "38:40", "url": "https://youtu.be/XZ0PMRWXBEU?t=2314s", "text": "And so at the end of the day, you can think of it as generating a sequence of actions that make sense."}, {"index": 428, "start": 2320.3, "end": 2331.6000000000004, "timestamp": "38:40", "endTimestamp": "38:52", "url": "https://youtu.be/XZ0PMRWXBEU?t=2320s", "text": "And so, again, the kind of machinery that we're going to talk about in this course translates pretty well to a lot of what we call imitation learning problems,"}, {"index": 429, "start": 2331.6, "end": 2335.7599999999998, "timestamp": "38:52", "endTimestamp": "38:56", "url": "https://youtu.be/XZ0PMRWXBEU?t=2331s", "text": "where you are given examples of good behavior provided maybe by a human."}, {"index": 430, "start": 2335.7599999999998, "end": 2339.7, "timestamp": "38:56", "endTimestamp": "39:00", "url": "https://youtu.be/XZ0PMRWXBEU?t=2335s", "text": "And you want your model to generate other behaviors that are good."}, {"index": 431, "start": 2340.36, "end": 2345.1, "timestamp": "39:00", "endTimestamp": "39:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=2340s", "text": "For example, you want the model to learn how to drive the car or how to stack objects."}, {"index": 432, "start": 2345.1, "end": 2354.7999999999997, "timestamp": "39:05", "endTimestamp": "39:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=2345s", "text": "And so here's an example of how you can kind of like use these sort of techniques that we're going to talk about in the course to learn how to drive the car in this video game."}, {"index": 433, "start": 2356.7999999999997, "end": 2367.9, "timestamp": "39:17", "endTimestamp": "39:28", "url": "https://youtu.be/XZ0PMRWXBEU?t=2356s", "text": "And you have to figure out, of course, what sort of actions make sense and to not crash into other cars and stay on the road and so forth."}, {"index": 434, "start": 2367.9, "end": 2374.98, "timestamp": "39:28", "endTimestamp": "39:35", "url": "https://youtu.be/XZ0PMRWXBEU?t=2367s", "text": "This is non-trivial, again, but if you have a good generative model, then you can make good decisions in this simulator."}, {"index": 435, "start": 2376.12, "end": 2382.86, "timestamp": "39:36", "endTimestamp": "39:43", "url": "https://youtu.be/XZ0PMRWXBEU?t=2376s", "text": "This is an example where you can kind of like train a diffusion model in this case to stack objects."}, {"index": 436, "start": 2383.84, "end": 2387.08, "timestamp": "39:44", "endTimestamp": "39:47", "url": "https://youtu.be/XZ0PMRWXBEU?t=2383s", "text": "So, again, you sort of like need to figure out what sort of trajectories make sense."}, {"index": 437, "start": 2387.32, "end": 2390.96, "timestamp": "39:47", "endTimestamp": "39:51", "url": "https://youtu.be/XZ0PMRWXBEU?t=2387s", "text": "And if you have a good model that understands which trajectories have the right structure,"}, {"index": 438, "start": 2390.96, "end": 2397.28, "timestamp": "39:51", "endTimestamp": "39:57", "url": "https://youtu.be/XZ0PMRWXBEU?t=2390s", "text": "then you can use it to stack a different set of objects and you can control the model to produce high-quality policies."}, {"index": 439, "start": 2399.5, "end": 2407.56, "timestamp": "40:00", "endTimestamp": "40:08", "url": "https://youtu.be/XZ0PMRWXBEU?t=2399s", "text": "There's a lot of excitement in the scientific science and engineering around generative models."}, {"index": 440, "start": 2407.56, "end": 2419.4, "timestamp": "40:08", "endTimestamp": "40:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=2407s", "text": "One of your TAs is one of the world's experts on using generative models to synthesize molecules that have certain properties or like proteins that have certain properties."}, {"index": 441, "start": 2419.4, "end": 2429.4, "timestamp": "40:19", "endTimestamp": "40:29", "url": "https://youtu.be/XZ0PMRWXBEU?t=2419s", "text": "And either on the level of their structure or even at the 3D level, can I really understand the layout of these molecules."}, {"index": 442, "start": 2430.46, "end": 2441.8, "timestamp": "40:30", "endTimestamp": "40:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=2430s", "text": "And, yeah, there is a lot of interest in this space around building generative models to design drugs or to design better catalysts."}, {"index": 443, "start": 2441.8, "end": 2450.34, "timestamp": "40:42", "endTimestamp": "40:50", "url": "https://youtu.be/XZ0PMRWXBEU?t=2441s", "text": "So, at the end of the day, you can think of it as, again, some kind of generative model where you have to come up with a recipe that does well at a certain task."}, {"index": 444, "start": 2450.34, "end": 2457.94, "timestamp": "40:50", "endTimestamp": "40:58", "url": "https://youtu.be/XZ0PMRWXBEU?t=2450s", "text": "And if you have trained a model on a lot of data on what kind of, let's say, proteins perform well in a certain task,"}, {"index": 445, "start": 2458.0, "end": 2463.7000000000003, "timestamp": "40:58", "endTimestamp": "41:04", "url": "https://youtu.be/XZ0PMRWXBEU?t=2458s", "text": "then you might be able to generate a sequence of amino acids that perform even better than the things we have."}, {"index": 446, "start": 2464.42, "end": 2472.0, "timestamp": "41:04", "endTimestamp": "41:12", "url": "https://youtu.be/XZ0PMRWXBEU?t=2464s", "text": "Or you might be able to design a drug that binds in a certain way because you're targeting, let's say, COVID or something."}, {"index": 447, "start": 2472.0, "end": 2482.46, "timestamp": "41:12", "endTimestamp": "41:22", "url": "https://youtu.be/XZ0PMRWXBEU?t=2472s", "text": "And so there is a lot of interest around building generative models over modalities that are somewhat different from the typical ones."}, {"index": 448, "start": 2482.54, "end": 2483.88, "timestamp": "41:23", "endTimestamp": "41:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=2482s", "text": "It's not images. It's not text."}, {"index": 449, "start": 2484.06, "end": 2486.04, "timestamp": "41:24", "endTimestamp": "41:26", "url": "https://youtu.be/XZ0PMRWXBEU?t=2484s", "text": "But it's the same generative models."}, {"index": 450, "start": 2486.16, "end": 2487.7, "timestamp": "41:26", "endTimestamp": "41:28", "url": "https://youtu.be/XZ0PMRWXBEU?t=2486s", "text": "It's still diffusion models."}, {"index": 451, "start": 2487.82, "end": 2489.36, "timestamp": "41:28", "endTimestamp": "41:29", "url": "https://youtu.be/XZ0PMRWXBEU?t=2487s", "text": "There's going to be autoregressive models."}, {"index": 452, "start": 2489.7, "end": 2494.74, "timestamp": "41:30", "endTimestamp": "41:35", "url": "https://youtu.be/XZ0PMRWXBEU?t=2489s", "text": "It's going to be the kind of models we're going to talk about in this course."}, {"index": 453, "start": 2496.84, "end": 2500.7, "timestamp": "41:37", "endTimestamp": "41:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=2496s", "text": "And, right, so lots of excitement."}, {"index": 454, "start": 2500.7, "end": 2512.58, "timestamp": "41:41", "endTimestamp": "41:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=2500s", "text": "There is other, you know, many other modalities that I didn't put in this LIDAC where there's been progress generating 3D objects."}, {"index": 455, "start": 2512.8399999999997, "end": 2518.2, "timestamp": "41:53", "endTimestamp": "41:58", "url": "https://youtu.be/XZ0PMRWXBEU?t=2512s", "text": "That's another very exciting kind of like area and many more."}, {"index": 456, "start": 2518.7, "end": 2523.8799999999997, "timestamp": "41:59", "endTimestamp": "42:04", "url": "https://youtu.be/XZ0PMRWXBEU?t=2518s", "text": "Of course, there is also a bit of worry."}, {"index": 457, "start": 2523.88, "end": 2536.8, "timestamp": "42:04", "endTimestamp": "42:17", "url": "https://youtu.be/XZ0PMRWXBEU?t=2523s", "text": "And hopefully we'll get to talk about it a bit in the class around, you know, computers are getting so good at generating content that it's hard to distinguish from the real one."}, {"index": 458, "start": 2537.2400000000002, "end": 2539.62, "timestamp": "42:17", "endTimestamp": "42:20", "url": "https://youtu.be/XZ0PMRWXBEU?t=2537s", "text": "You know, there is this big issue around deepfakes."}, {"index": 459, "start": 2539.94, "end": 2541.94, "timestamp": "42:20", "endTimestamp": "42:22", "url": "https://youtu.be/XZ0PMRWXBEU?t=2539s", "text": "You know, which one is real, which one is fake?"}, {"index": 460, "start": 2542.4, "end": 2544.4, "timestamp": "42:22", "endTimestamp": "42:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=2542s", "text": "This was produced again by my students."}, {"index": 461, "start": 2544.4, "end": 2549.9, "timestamp": "42:24", "endTimestamp": "42:30", "url": "https://youtu.be/XZ0PMRWXBEU?t=2544s", "text": "I think I kind of get a sense of the sort of dangers that these kind of technologies can have."}, {"index": 462, "start": 2550.1800000000003, "end": 2554.8, "timestamp": "42:30", "endTimestamp": "42:35", "url": "https://youtu.be/XZ0PMRWXBEU?t=2550s", "text": "And there is a lot of potential for misuse of these sort of systems."}, {"index": 463, "start": 2555.02, "end": 2558.44, "timestamp": "42:35", "endTimestamp": "42:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=2555s", "text": "So hopefully we'll get to talk about that too in the class."}, {"index": 464, "start": 2559.6800000000003, "end": 2560.7400000000002, "timestamp": "42:40", "endTimestamp": "42:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=2559s", "text": "So, all right."}, {"index": 465, "start": 2560.78, "end": 2564.4, "timestamp": "42:41", "endTimestamp": "42:44", "url": "https://youtu.be/XZ0PMRWXBEU?t=2560s", "text": "So that was sort of like the intro."}, {"index": 466, "start": 2565.54, "end": 2568.02, "timestamp": "42:46", "endTimestamp": "42:48", "url": "https://youtu.be/XZ0PMRWXBEU?t=2565s", "text": "Hopefully it got you excited about the topic."}, {"index": 467, "start": 2568.02, "end": 2572.6, "timestamp": "42:48", "endTimestamp": "42:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=2568s", "text": "And it kind of like showed you that it's really an exciting time to be working in this area."}, {"index": 468, "start": 2572.68, "end": 2577.72, "timestamp": "42:53", "endTimestamp": "42:58", "url": "https://youtu.be/XZ0PMRWXBEU?t=2572s", "text": "And that's why there's so much excitement also in the industry and in academia around these topics."}, {"index": 469, "start": 2577.86, "end": 2585.0, "timestamp": "42:58", "endTimestamp": "43:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=2577s", "text": "Everybody's trying to innovate, build systems, figure out how to use them in the real world, find new applications."}, {"index": 470, "start": 2585.84, "end": 2588.54, "timestamp": "43:06", "endTimestamp": "43:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=2585s", "text": "So it's really an exciting time to study this."}, {"index": 471, "start": 2588.54, "end": 2601.14, "timestamp": "43:09", "endTimestamp": "43:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=2588s", "text": "The course is designed to really give you the, uncover the, what we think are the core concepts in this space."}, {"index": 472, "start": 2602.6, "end": 2609.22, "timestamp": "43:23", "endTimestamp": "43:29", "url": "https://youtu.be/XZ0PMRWXBEU?t=2602s", "text": "Once you understand all the different building blocks, the kind of challenges, the kind of trade-offs that all these models do,"}, {"index": 473, "start": 2610.18, "end": 2615.22, "timestamp": "43:30", "endTimestamp": "43:35", "url": "https://youtu.be/XZ0PMRWXBEU?t=2610s", "text": "then you can not only understand how existing systems work,"}, {"index": 474, "start": 2615.3, "end": 2618.42, "timestamp": "43:35", "endTimestamp": "43:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=2615s", "text": "but hopefully you can also, you know, design the next generation of these systems."}, {"index": 475, "start": 2618.54, "end": 2623.38, "timestamp": "43:39", "endTimestamp": "43:43", "url": "https://youtu.be/XZ0PMRWXBEU?t=2618s", "text": "You can also improve them, figure out how to use them on a new application area."}, {"index": 476, "start": 2625.02, "end": 2629.14, "timestamp": "43:45", "endTimestamp": "43:49", "url": "https://youtu.be/XZ0PMRWXBEU?t=2625s", "text": "Again, the system, the course is designed to be pretty rigorous."}, {"index": 477, "start": 2629.56, "end": 2630.92, "timestamp": "43:50", "endTimestamp": "43:51", "url": "https://youtu.be/XZ0PMRWXBEU?t=2629s", "text": "There's going to be quite a bit of math."}, {"index": 478, "start": 2631.2799999999997, "end": 2634.66, "timestamp": "43:51", "endTimestamp": "43:55", "url": "https://youtu.be/XZ0PMRWXBEU?t=2631s", "text": "It's really going to delve deep into the key ideas."}, {"index": 479, "start": 2635.72, "end": 2641.22, "timestamp": "43:56", "endTimestamp": "44:01", "url": "https://youtu.be/XZ0PMRWXBEU?t=2635s", "text": "So we're going to talk a lot about representation, as we discussed."}, {"index": 480, "start": 2641.68, "end": 2644.8, "timestamp": "44:02", "endTimestamp": "44:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=2641s", "text": "The key building block is going to be statistical modeling."}, {"index": 481, "start": 2644.98, "end": 2646.7, "timestamp": "44:05", "endTimestamp": "44:07", "url": "https://youtu.be/XZ0PMRWXBEU?t=2644s", "text": "We're going to be using probability distributions."}, {"index": 482, "start": 2646.7, "end": 2648.9399999999996, "timestamp": "44:07", "endTimestamp": "44:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=2646s", "text": "That's going to be the key building block."}, {"index": 483, "start": 2649.74, "end": 2655.6, "timestamp": "44:10", "endTimestamp": "44:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=2649s", "text": "And so we're going to talk a lot about how to represent these probability distributions,"}, {"index": 484, "start": 2655.7599999999998, "end": 2660.8199999999997, "timestamp": "44:16", "endTimestamp": "44:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=2655s", "text": "how to use neural networks to model probability distributions,"}, {"index": 485, "start": 2660.8199999999997, "end": 2662.8199999999997, "timestamp": "44:21", "endTimestamp": "44:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=2660s", "text": "where we have many random variables."}, {"index": 486, "start": 2663.2, "end": 2664.14, "timestamp": "44:23", "endTimestamp": "44:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=2663s", "text": "That is the challenge."}, {"index": 487, "start": 2664.2599999999998, "end": 2668.18, "timestamp": "44:24", "endTimestamp": "44:28", "url": "https://youtu.be/XZ0PMRWXBEU?t=2664s", "text": "I mean, you've seen simple probability distributions, like Gaussians and things like that."}, {"index": 488, "start": 2668.18, "end": 2674.2599999999998, "timestamp": "44:28", "endTimestamp": "44:34", "url": "https://youtu.be/XZ0PMRWXBEU?t=2668s", "text": "That doesn't work in this space because you have so many different things that you have to consider"}, {"index": 489, "start": 2674.2599999999998, "end": 2675.8999999999996, "timestamp": "44:34", "endTimestamp": "44:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=2674s", "text": "and you have to model at the same time."}, {"index": 490, "start": 2676.3999999999996, "end": 2682.5, "timestamp": "44:36", "endTimestamp": "44:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=2676s", "text": "And so you need to come up with clever ways to represent how all the different pixels in an image interact with each other"}, {"index": 491, "start": 2682.5, "end": 2686.16, "timestamp": "44:42", "endTimestamp": "44:46", "url": "https://youtu.be/XZ0PMRWXBEU?t=2682s", "text": "or how the different words in a sentence, they are connected to each other."}, {"index": 492, "start": 2686.16, "end": 2693.14, "timestamp": "44:46", "endTimestamp": "44:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=2686s", "text": "And so a lot of the course content will focus on different ideas,"}, {"index": 493, "start": 2693.44, "end": 2697.94, "timestamp": "44:53", "endTimestamp": "44:58", "url": "https://youtu.be/XZ0PMRWXBEU?t=2693s", "text": "the different trade-offs that you have to make when you build these kind of models."}, {"index": 494, "start": 2699.14, "end": 2700.44, "timestamp": "44:59", "endTimestamp": "45:00", "url": "https://youtu.be/XZ0PMRWXBEU?t=2699s", "text": "We're going to talk about learning."}, {"index": 495, "start": 2700.7799999999997, "end": 2703.8199999999997, "timestamp": "45:01", "endTimestamp": "45:04", "url": "https://youtu.be/XZ0PMRWXBEU?t=2700s", "text": "Again, these are going to be statistical generative models."}, {"index": 496, "start": 2703.82, "end": 2707.84, "timestamp": "45:04", "endTimestamp": "45:08", "url": "https://youtu.be/XZ0PMRWXBEU?t=2703s", "text": "So there's always going to be data, and you're going to use the data to fit the models."}, {"index": 497, "start": 2708.76, "end": 2711.86, "timestamp": "45:09", "endTimestamp": "45:12", "url": "https://youtu.be/XZ0PMRWXBEU?t=2708s", "text": "And there's many different ways to fit models."}, {"index": 498, "start": 2711.96, "end": 2714.2400000000002, "timestamp": "45:12", "endTimestamp": "45:14", "url": "https://youtu.be/XZ0PMRWXBEU?t=2711s", "text": "There's many different kinds of loss functions that you can use."}, {"index": 499, "start": 2714.34, "end": 2716.28, "timestamp": "45:14", "endTimestamp": "45:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=2714s", "text": "There's the stuff that is used in diffusion models."}, {"index": 500, "start": 2716.38, "end": 2719.3, "timestamp": "45:16", "endTimestamp": "45:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=2716s", "text": "There's the stuff that is used in generative adversarial networks."}, {"index": 501, "start": 2719.4, "end": 2723.88, "timestamp": "45:19", "endTimestamp": "45:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=2719s", "text": "There is the stuff that is used in, let's say, large language models, autoregressive models."}, {"index": 502, "start": 2724.4, "end": 2728.92, "timestamp": "45:24", "endTimestamp": "45:29", "url": "https://youtu.be/XZ0PMRWXBEU?t=2724s", "text": "Those are essentially boiled down to different ways of comparing these probability distributions."}, {"index": 503, "start": 2729.36, "end": 2730.6800000000003, "timestamp": "45:29", "endTimestamp": "45:31", "url": "https://youtu.be/XZ0PMRWXBEU?t=2729s", "text": "You have a data distribution."}, {"index": 504, "start": 2731.2400000000002, "end": 2732.7000000000003, "timestamp": "45:31", "endTimestamp": "45:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=2731s", "text": "You have the model distribution."}, {"index": 505, "start": 2732.7, "end": 2738.0, "timestamp": "45:33", "endTimestamp": "45:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=2732s", "text": "And you want those two things to be similar so that when you generate samples from the model,"}, {"index": 506, "start": 2738.3199999999997, "end": 2741.9399999999996, "timestamp": "45:38", "endTimestamp": "45:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=2738s", "text": "they look like the ones that came from the data distribution."}, {"index": 507, "start": 2742.8799999999997, "end": 2747.8399999999997, "timestamp": "45:43", "endTimestamp": "45:48", "url": "https://youtu.be/XZ0PMRWXBEU?t=2742s", "text": "But probability distributions, again, going back to the first point, they are very complex."}, {"index": 508, "start": 2748.06, "end": 2752.7999999999997, "timestamp": "45:48", "endTimestamp": "45:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=2748s", "text": "If you have very complicated objects, very high-dimensional objects,"}, {"index": 509, "start": 2753.18, "end": 2756.2, "timestamp": "45:53", "endTimestamp": "45:56", "url": "https://youtu.be/XZ0PMRWXBEU?t=2753s", "text": "so it's not straightforward to compare to probability distributions"}, {"index": 510, "start": 2756.2, "end": 2759.1, "timestamp": "45:56", "endTimestamp": "45:59", "url": "https://youtu.be/XZ0PMRWXBEU?t=2756s", "text": "and kind of measure how similar they are."}, {"index": 511, "start": 2759.3399999999997, "end": 2761.68, "timestamp": "45:59", "endTimestamp": "46:02", "url": "https://youtu.be/XZ0PMRWXBEU?t=2759s", "text": "So you have to sort of like, you have a data distribution."}, {"index": 512, "start": 2761.68, "end": 2764.06, "timestamp": "46:02", "endTimestamp": "46:04", "url": "https://youtu.be/XZ0PMRWXBEU?t=2761s", "text": "You have a family of models that you can pick from."}, {"index": 513, "start": 2764.4199999999996, "end": 2767.8999999999996, "timestamp": "46:04", "endTimestamp": "46:08", "url": "https://youtu.be/XZ0PMRWXBEU?t=2764s", "text": "And you kind of like have to pick one that is close to the data."}, {"index": 514, "start": 2767.9, "end": 2771.6800000000003, "timestamp": "46:08", "endTimestamp": "46:12", "url": "https://youtu.be/XZ0PMRWXBEU?t=2767s", "text": "But measuring similarity is very difficult."}, {"index": 515, "start": 2772.2000000000003, "end": 2775.54, "timestamp": "46:12", "endTimestamp": "46:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=2772s", "text": "And depending on how you measure similarity, you're going to get different kinds of models"}, {"index": 516, "start": 2775.54, "end": 2778.42, "timestamp": "46:16", "endTimestamp": "46:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=2775s", "text": "that work well in different kinds of scenarios."}, {"index": 517, "start": 2779.92, "end": 2781.6800000000003, "timestamp": "46:20", "endTimestamp": "46:22", "url": "https://youtu.be/XZ0PMRWXBEU?t=2779s", "text": "And then we're going to talk about inference."}, {"index": 518, "start": 2781.9, "end": 2786.82, "timestamp": "46:22", "endTimestamp": "46:27", "url": "https://youtu.be/XZ0PMRWXBEU?t=2781s", "text": "We're going to talk about, you know, how to generate samples from these models efficiently."}, {"index": 519, "start": 2786.82, "end": 2791.6800000000003, "timestamp": "46:27", "endTimestamp": "46:32", "url": "https://youtu.be/XZ0PMRWXBEU?t=2786s", "text": "Sometimes you have the probability distribution, but it might not be straightforward to sample from it."}, {"index": 520, "start": 2792.26, "end": 2794.0800000000004, "timestamp": "46:32", "endTimestamp": "46:34", "url": "https://youtu.be/XZ0PMRWXBEU?t=2792s", "text": "So we will talk about that."}, {"index": 521, "start": 2794.1800000000003, "end": 2797.1000000000004, "timestamp": "46:34", "endTimestamp": "46:37", "url": "https://youtu.be/XZ0PMRWXBEU?t=2794s", "text": "We will talk about how to invert the generative process,"}, {"index": 522, "start": 2797.46, "end": 2800.7000000000003, "timestamp": "46:37", "endTimestamp": "46:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=2797s", "text": "how to get representations from these objects."}, {"index": 523, "start": 2800.7, "end": 2809.7, "timestamp": "46:41", "endTimestamp": "46:50", "url": "https://youtu.be/XZ0PMRWXBEU?t=2800s", "text": "For example, kind of like, sort of like, following and making the idea of vision as inverse graphic a little bit more concrete."}, {"index": 524, "start": 2811.3199999999997, "end": 2816.3799999999997, "timestamp": "46:51", "endTimestamp": "46:56", "url": "https://youtu.be/XZ0PMRWXBEU?t=2811s", "text": "So we'll touch on unsupervised learning, different ways of sort of like clustering."}, {"index": 525, "start": 2817.2799999999997, "end": 2822.3799999999997, "timestamp": "46:57", "endTimestamp": "47:02", "url": "https://youtu.be/XZ0PMRWXBEU?t=2817s", "text": "Because at the end of the day, what these models do is they have to find similarity between data points."}, {"index": 526, "start": 2822.96, "end": 2828.1, "timestamp": "47:03", "endTimestamp": "47:08", "url": "https://youtu.be/XZ0PMRWXBEU?t=2822s", "text": "When you're trying to complete a sentence, what you have to do is you have to go through your training set."}, {"index": 527, "start": 2828.1800000000003, "end": 2829.4, "timestamp": "47:08", "endTimestamp": "47:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=2828s", "text": "You have to find similar sentences."}, {"index": 528, "start": 2829.58, "end": 2830.88, "timestamp": "47:10", "endTimestamp": "47:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=2829s", "text": "You have to figure out how to combine them."}, {"index": 529, "start": 2830.92, "end": 2834.98, "timestamp": "47:11", "endTimestamp": "47:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=2830s", "text": "And you have to figure out how to complete the prompt that you're given."}, {"index": 530, "start": 2835.82, "end": 2841.92, "timestamp": "47:16", "endTimestamp": "47:22", "url": "https://youtu.be/XZ0PMRWXBEU?t=2835s", "text": "So once you have generative models, you can usually also get sort of like representations."}, {"index": 531, "start": 2842.2200000000003, "end": 2845.3, "timestamp": "47:22", "endTimestamp": "47:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=2842s", "text": "You have ways of clustering data points that have similar meaning."}, {"index": 532, "start": 2846.8, "end": 2848.7000000000003, "timestamp": "47:27", "endTimestamp": "47:29", "url": "https://youtu.be/XZ0PMRWXBEU?t=2846s", "text": "And again, you can get features."}, {"index": 533, "start": 2848.7, "end": 2852.8999999999996, "timestamp": "47:29", "endTimestamp": "47:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=2848s", "text": "And you can do kind of like the sort of things you would want to do in unsupervised learning,"}, {"index": 534, "start": 2853.1, "end": 2856.68, "timestamp": "47:33", "endTimestamp": "47:37", "url": "https://youtu.be/XZ0PMRWXBEU?t=2853s", "text": "which is do machine learning when you don't have labels."}, {"index": 535, "start": 2856.8599999999997, "end": 2861.56, "timestamp": "47:37", "endTimestamp": "47:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=2856s", "text": "You only have the X, but you don't have the Y."}, {"index": 536, "start": 2862.06, "end": 2867.4399999999996, "timestamp": "47:42", "endTimestamp": "47:47", "url": "https://youtu.be/XZ0PMRWXBEU?t=2862s", "text": "And you want to do interesting things with the features themselves."}, {"index": 537, "start": 2869.8999999999996, "end": 2875.96, "timestamp": "47:50", "endTimestamp": "47:56", "url": "https://youtu.be/XZ0PMRWXBEU?t=2869s", "text": "And so those are sort of like the three key ideas that are going to show up quite a bit."}, {"index": 538, "start": 2875.96, "end": 2884.58, "timestamp": "47:56", "endTimestamp": "48:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=2875s", "text": "In terms of models, we're going to be talking about first perhaps the simplest kind of model,"}, {"index": 539, "start": 2885.18, "end": 2890.28, "timestamp": "48:05", "endTimestamp": "48:10", "url": "https://youtu.be/XZ0PMRWXBEU?t=2885s", "text": "which is one where essentially you have access to a likelihood directly."}, {"index": 540, "start": 2891.48, "end": 2895.5, "timestamp": "48:11", "endTimestamp": "48:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=2891s", "text": "And there's going to be two kinds of models in this space,"}, {"index": 541, "start": 2895.62, "end": 2897.7400000000002, "timestamp": "48:16", "endTimestamp": "48:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=2895s", "text": "autoregressive models and flow-based models."}, {"index": 542, "start": 2898.3, "end": 2901.14, "timestamp": "48:18", "endTimestamp": "48:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=2898s", "text": "Autoregressive models are the ones used in large language models"}, {"index": 543, "start": 2901.14, "end": 2904.1, "timestamp": "48:21", "endTimestamp": "48:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=2901s", "text": "and a few of other systems that I talked about today."}, {"index": 544, "start": 2905.54, "end": 2911.96, "timestamp": "48:26", "endTimestamp": "48:32", "url": "https://youtu.be/XZ0PMRWXBEU?t=2905s", "text": "Flow-based models are a different kind of idea that is often used for images"}, {"index": 545, "start": 2911.96, "end": 2913.5, "timestamp": "48:32", "endTimestamp": "48:34", "url": "https://youtu.be/XZ0PMRWXBEU?t=2911s", "text": "and other kinds of continuous data."}, {"index": 546, "start": 2915.8799999999997, "end": 2917.96, "timestamp": "48:36", "endTimestamp": "48:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=2915s", "text": "Then we'll talk about latent variable models."}, {"index": 547, "start": 2918.42, "end": 2922.72, "timestamp": "48:38", "endTimestamp": "48:43", "url": "https://youtu.be/XZ0PMRWXBEU?t=2918s", "text": "The idea of using latent variables to increase the expressive power, essentially,"}, {"index": 548, "start": 2922.8599999999997, "end": 2924.98, "timestamp": "48:43", "endTimestamp": "48:45", "url": "https://youtu.be/XZ0PMRWXBEU?t=2922s", "text": "of your generative models."}, {"index": 549, "start": 2924.98, "end": 2928.36, "timestamp": "48:45", "endTimestamp": "48:48", "url": "https://youtu.be/XZ0PMRWXBEU?t=2924s", "text": "We'll talk about variational inference, variational learning,"}, {"index": 550, "start": 2928.68, "end": 2931.96, "timestamp": "48:49", "endTimestamp": "48:52", "url": "https://youtu.be/XZ0PMRWXBEU?t=2928s", "text": "the variational autoencoder, hierarchical variational autoencoders,"}, {"index": 551, "start": 2932.38, "end": 2933.22, "timestamp": "48:52", "endTimestamp": "48:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=2932s", "text": "those sort of ideas."}, {"index": 552, "start": 2934.04, "end": 2936.54, "timestamp": "48:54", "endTimestamp": "48:57", "url": "https://youtu.be/XZ0PMRWXBEU?t=2934s", "text": "We'll talk about implicit generative models."}, {"index": 553, "start": 2936.96, "end": 2941.7, "timestamp": "48:57", "endTimestamp": "49:02", "url": "https://youtu.be/XZ0PMRWXBEU?t=2936s", "text": "Here the idea is that instead of representing the probability distribution, P of X,"}, {"index": 554, "start": 2942.18, "end": 2946.6, "timestamp": "49:02", "endTimestamp": "49:07", "url": "https://youtu.be/XZ0PMRWXBEU?t=2942s", "text": "you're going to represent the sampling process that you use to generate samples."}, {"index": 555, "start": 2947.46, "end": 2948.88, "timestamp": "49:07", "endTimestamp": "49:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=2947s", "text": "And that has trade-offs."}, {"index": 556, "start": 2948.88, "end": 2951.84, "timestamp": "49:09", "endTimestamp": "49:12", "url": "https://youtu.be/XZ0PMRWXBEU?t=2948s", "text": "It allows you to generate samples very efficiently,"}, {"index": 557, "start": 2952.2200000000003, "end": 2954.7400000000002, "timestamp": "49:12", "endTimestamp": "49:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=2952s", "text": "but it becomes difficult to train the models"}, {"index": 558, "start": 2954.7400000000002, "end": 2958.08, "timestamp": "49:15", "endTimestamp": "49:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=2954s", "text": "because you don't have access to a likelihood anymore."}, {"index": 559, "start": 2958.26, "end": 2960.8, "timestamp": "49:18", "endTimestamp": "49:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=2958s", "text": "So you cannot use maximum likelihood estimation,"}, {"index": 560, "start": 2961.1600000000003, "end": 2964.0, "timestamp": "49:21", "endTimestamp": "49:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=2961s", "text": "those kind of ideas that we understand very well."}, {"index": 561, "start": 2964.58, "end": 2966.96, "timestamp": "49:25", "endTimestamp": "49:27", "url": "https://youtu.be/XZ0PMRWXBEU?t=2964s", "text": "And we know have good performance."}, {"index": 562, "start": 2968.1, "end": 2970.54, "timestamp": "49:28", "endTimestamp": "49:31", "url": "https://youtu.be/XZ0PMRWXBEU?t=2968s", "text": "So we'll talk about two sample tests,"}, {"index": 563, "start": 2970.98, "end": 2974.42, "timestamp": "49:31", "endTimestamp": "49:34", "url": "https://youtu.be/XZ0PMRWXBEU?t=2970s", "text": "F divergencies and different ways of training these sort of systems."}, {"index": 564, "start": 2974.42, "end": 2978.76, "timestamp": "49:34", "endTimestamp": "49:39", "url": "https://youtu.be/XZ0PMRWXBEU?t=2974s", "text": "And in particular, we'll talk about generative adversarial networks"}, {"index": 565, "start": 2978.76, "end": 2980.54, "timestamp": "49:39", "endTimestamp": "49:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=2978s", "text": "and how to train them."}, {"index": 566, "start": 2981.38, "end": 2984.8, "timestamp": "49:41", "endTimestamp": "49:45", "url": "https://youtu.be/XZ0PMRWXBEU?t=2981s", "text": "Then we'll talk about energy-based models and diffusion models."}, {"index": 567, "start": 2985.66, "end": 2988.54, "timestamp": "49:46", "endTimestamp": "49:49", "url": "https://youtu.be/XZ0PMRWXBEU?t=2985s", "text": "Again, this is sort of like a state-of-the-art"}, {"index": 568, "start": 2988.54, "end": 2991.64, "timestamp": "49:49", "endTimestamp": "49:52", "url": "https://youtu.be/XZ0PMRWXBEU?t=2988s", "text": "in terms of like image generation, audio generation."}, {"index": 569, "start": 2992.14, "end": 2994.26, "timestamp": "49:52", "endTimestamp": "49:54", "url": "https://youtu.be/XZ0PMRWXBEU?t=2992s", "text": "People are starting to use them also for text."}, {"index": 570, "start": 2996.16, "end": 2998.84, "timestamp": "49:56", "endTimestamp": "49:59", "url": "https://youtu.be/XZ0PMRWXBEU?t=2996s", "text": "That's what's the technology behind the video generation"}, {"index": 571, "start": 2998.84, "end": 2999.8, "timestamp": "49:59", "endTimestamp": "50:00", "url": "https://youtu.be/XZ0PMRWXBEU?t=2998s", "text": "that I showed you before."}, {"index": 572, "start": 3001.0, "end": 3003.42, "timestamp": "50:01", "endTimestamp": "50:03", "url": "https://youtu.be/XZ0PMRWXBEU?t=3001s", "text": "So we'll talk in depth about how they work"}, {"index": 573, "start": 3003.42, "end": 3006.48, "timestamp": "50:03", "endTimestamp": "50:06", "url": "https://youtu.be/XZ0PMRWXBEU?t=3003s", "text": "and how you can think of them in terms of a latent variable model"}, {"index": 574, "start": 3006.48, "end": 3009.44, "timestamp": "50:06", "endTimestamp": "50:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=3006s", "text": "and the connections with all the other things."}, {"index": 575, "start": 3010.5, "end": 3015.16, "timestamp": "50:10", "endTimestamp": "50:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=3010s", "text": "And, yeah, again, it's going to be a fairly mathematical class."}, {"index": 576, "start": 3015.3, "end": 3017.12, "timestamp": "50:15", "endTimestamp": "50:17", "url": "https://youtu.be/XZ0PMRWXBEU?t=3015s", "text": "So there's going to be a lot of theory."}, {"index": 577, "start": 3017.28, "end": 3018.7000000000003, "timestamp": "50:17", "endTimestamp": "50:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=3017s", "text": "There's going to be algorithms."}, {"index": 578, "start": 3019.14, "end": 3020.88, "timestamp": "50:19", "endTimestamp": "50:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=3019s", "text": "And I will go through applications."}, {"index": 579, "start": 3022.16, "end": 3023.52, "timestamp": "50:22", "endTimestamp": "50:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=3022s", "text": "There is going to be homeworks."}, {"index": 580, "start": 3023.52, "end": 3025.44, "timestamp": "50:24", "endTimestamp": "50:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=3023s", "text": "We're going to get to play around with these models."}, {"index": 581, "start": 3025.44, "end": 3031.3, "timestamp": "50:25", "endTimestamp": "50:31", "url": "https://youtu.be/XZ0PMRWXBEU?t=3025s", "text": "And, yeah, so in terms of prereqs,"}, {"index": 582, "start": 3031.56, "end": 3036.12, "timestamp": "50:32", "endTimestamp": "50:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=3031s", "text": "we're expecting you to have taken at least a machine learning class."}, {"index": 583, "start": 3037.12, "end": 3041.26, "timestamp": "50:37", "endTimestamp": "50:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=3037s", "text": "We'll try to cover, try to do as much as possible from scratch,"}, {"index": 584, "start": 3041.26, "end": 3044.96, "timestamp": "50:41", "endTimestamp": "50:45", "url": "https://youtu.be/XZ0PMRWXBEU?t=3041s", "text": "and we'll have some sections to go over some of the background content."}, {"index": 585, "start": 3044.96, "end": 3050.3, "timestamp": "50:45", "endTimestamp": "50:50", "url": "https://youtu.be/XZ0PMRWXBEU?t=3044s", "text": "But it might be pretty hard to take this class if you've never done any ML before."}, {"index": 586, "start": 3050.3, "end": 3058.38, "timestamp": "50:50", "endTimestamp": "50:58", "url": "https://youtu.be/XZ0PMRWXBEU?t=3050s", "text": "So you should be familiar with basic probability theory, calculus."}, {"index": 587, "start": 3058.6400000000003, "end": 3062.96, "timestamp": "50:59", "endTimestamp": "51:03", "url": "https://youtu.be/XZ0PMRWXBEU?t=3058s", "text": "We're going to use gradient descent, linear algebra, Bayes' rule,"}, {"index": 588, "start": 3063.5, "end": 3067.46, "timestamp": "51:04", "endTimestamp": "51:07", "url": "https://youtu.be/XZ0PMRWXBEU?t=3063s", "text": "those sort of things, basic calculus sort of stuff,"}, {"index": 589, "start": 3067.9, "end": 3069.1600000000003, "timestamp": "51:08", "endTimestamp": "51:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=3067s", "text": "change of variable formula."}, {"index": 590, "start": 3070.42, "end": 3072.1000000000004, "timestamp": "51:10", "endTimestamp": "51:12", "url": "https://youtu.be/XZ0PMRWXBEU?t=3070s", "text": "Yeah, you should be familiar with that."}, {"index": 591, "start": 3072.54, "end": 3073.86, "timestamp": "51:13", "endTimestamp": "51:14", "url": "https://youtu.be/XZ0PMRWXBEU?t=3072s", "text": "Again, you can probably pick it up,"}, {"index": 592, "start": 3074.0, "end": 3078.5800000000004, "timestamp": "51:14", "endTimestamp": "51:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=3074s", "text": "but it might be pretty tricky if you've never seen this sort of ideas before."}, {"index": 593, "start": 3078.58, "end": 3083.22, "timestamp": "51:19", "endTimestamp": "51:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=3078s", "text": "And then, yeah, there is going to be programming assignments."}, {"index": 594, "start": 3083.68, "end": 3087.44, "timestamp": "51:24", "endTimestamp": "51:27", "url": "https://youtu.be/XZ0PMRWXBEU?t=3083s", "text": "So you should be familiar with, hopefully, Python."}, {"index": 595, "start": 3087.6, "end": 3089.22, "timestamp": "51:28", "endTimestamp": "51:29", "url": "https://youtu.be/XZ0PMRWXBEU?t=3087s", "text": "That's what we're g imestamp": "54:10", "endTimestamp": "54:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=3250s", "text": "There's going to be a report that you have kind of like to turn in about how things are going."}, {"index": 634, "start": 3257.22, "end": 3260.04, "timestamp": "54:17", "endTimestamp": "54:20", "url": "https://youtu.be/XZ0PMRWXBEU?t=3257s", "text": "There's going to be a poster presentation towards the end."}, {"index": 635, "start": 3260.04, "end": 3263.1, "timestamp": "54:20", "endTimestamp": "54:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=3260s", "text": "And then a final report on the work you did."}, {"index": 636, "start": 3264.84, "end": 3266.56, "timestamp": "54:25", "endTimestamp": "54:27", "url": "https://youtu.be/XZ0PMRWXBEU?t=3264s", "text": "And, yeah, projects."}, {"index": 637, "start": 3267.48, "end": 3272.22, "timestamp": "54:27", "endTimestamp": "54:32", "url": "https://youtu.be/XZ0PMRWXBEU?t=3267s", "text": "I think I like this class, which really gives you an opportunity to explore."}, {"index": 638, "start": 3272.5, "end": 3277.9, "timestamp": "54:32", "endTimestamp": "54:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=3272s", "text": "And there's just so much that you can do in this space that there's lots of interesting project ideas"}, {"index": 639, "start": 3277.9, "end": 3281.06, "timestamp": "54:38", "endTimestamp": "54:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=3277s", "text": "that turned out to be papers, turned out to be company ideas."}, {"index": 640, "start": 3282.16, "end": 3283.52, "timestamp": "54:42", "endTimestamp": "54:44", "url": "https://youtu.be/XZ0PMRWXBEU?t=3282s", "text": "Lots of excitement here."}, {"index": 641, "start": 3284.2599999999998, "end": 3285.68, "timestamp": "54:44", "endTimestamp": "54:46", "url": "https://youtu.be/XZ0PMRWXBEU?t=3284s", "text": "You can work in groups."}, {"index": 642, "start": 3286.0, "end": 3287.34, "timestamp": "54:46", "endTimestamp": "54:47", "url": "https://youtu.be/XZ0PMRWXBEU?t=3286s", "text": "Let's say up to three students."}, {"index": 643, "start": 3287.34, "end": 3290.8, "timestamp": "54:47", "endTimestamp": "54:51", "url": "https://youtu.be/XZ0PMRWXBEU?t=3287s", "text": "And typically, it's one of these three things."}, {"index": 644, "start": 3290.94, "end": 3295.3, "timestamp": "54:51", "endTimestamp": "54:55", "url": "https://youtu.be/XZ0PMRWXBEU?t=3290s", "text": "Sometimes students apply an existing generative model to a new data set."}, {"index": 645, "start": 3295.5, "end": 3297.08, "timestamp": "54:56", "endTimestamp": "54:57", "url": "https://youtu.be/XZ0PMRWXBEU?t=3295s", "text": "Maybe they come from an application domain,"}, {"index": 646, "start": 3297.26, "end": 3301.46, "timestamp": "54:57", "endTimestamp": "55:01", "url": "https://youtu.be/XZ0PMRWXBEU?t=3297s", "text": "and they find out a new interesting way to use the models on a new problem,"}, {"index": 647, "start": 3301.52, "end": 3305.42, "timestamp": "55:02", "endTimestamp": "55:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=3301s", "text": "or they compare different generative models on a new kind of data set."}, {"index": 648, "start": 3306.7400000000002, "end": 3310.0, "timestamp": "55:07", "endTimestamp": "55:10", "url": "https://youtu.be/XZ0PMRWXBEU?t=3306s", "text": "Sometimes people work on trying to just improve the models."}, {"index": 649, "start": 3311.32, "end": 3313.94, "timestamp": "55:11", "endTimestamp": "55:14", "url": "https://youtu.be/XZ0PMRWXBEU?t=3311s", "text": "Again, these things are pretty new."}, {"index": 650, "start": 3313.94, "end": 3317.62, "timestamp": "55:14", "endTimestamp": "55:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=3313s", "text": "It's unlikely that we found the best way of solving these problems,"}, {"index": 651, "start": 3317.76, "end": 3319.36, "timestamp": "55:18", "endTimestamp": "55:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=3317s", "text": "so there's still a lot of room for improvement."}, {"index": 652, "start": 3320.26, "end": 3322.86, "timestamp": "55:20", "endTimestamp": "55:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=3320s", "text": "Often, you can combine different methods."}, {"index": 653, "start": 3323.0, "end": 3324.68, "timestamp": "55:23", "endTimestamp": "55:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=3323s", "text": "You can take a diffusion model."}, {"index": 654, "start": 3324.84, "end": 3330.5, "timestamp": "55:25", "endTimestamp": "55:30", "url": "https://youtu.be/XZ0PMRWXBEU?t=3324s", "text": "You can add a little bit of generative adversarial training flavor to it,"}, {"index": 655, "start": 3330.54, "end": 3331.68, "timestamp": "55:31", "endTimestamp": "55:32", "url": "https://youtu.be/XZ0PMRWXBEU?t=3330s", "text": "and you can get big improvements."}, {"index": 656, "start": 3331.68, "end": 3338.8399999999997, "timestamp": "55:32", "endTimestamp": "55:39", "url": "https://youtu.be/XZ0PMRWXBEU?t=3331s", "text": "Often, these things can be published in top machine learning conferences if they work well."}, {"index": 657, "start": 3339.96, "end": 3342.7599999999998, "timestamp": "55:40", "endTimestamp": "55:43", "url": "https://youtu.be/XZ0PMRWXBEU?t=3339s", "text": "And sometimes people do more theoretical analysis."}, {"index": 658, "start": 3343.46, "end": 3346.06, "timestamp": "55:43", "endTimestamp": "55:46", "url": "https://youtu.be/XZ0PMRWXBEU?t=3343s", "text": "There's going to be quite a bit of theory, quite a bit of math,"}, {"index": 659, "start": 3346.14, "end": 3348.9199999999996, "timestamp": "55:46", "endTimestamp": "55:49", "url": "https://youtu.be/XZ0PMRWXBEU?t=3346s", "text": "and so there is room for improvement in trying to understand"}, {"index": 660, "start": 3348.9199999999996, "end": 3352.8199999999997, "timestamp": "55:49", "endTimestamp": "55:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=3348s", "text": "why these models work, when they work, when they fail."}, {"index": 661, "start": 3352.82, "end": 3354.82, "timestamp": "55:53", "endTimestamp": "55:55", "url": "https://youtu.be/XZ0PMRWXBEU?t=3352s", "text": "Right now, it's all very, very empirical,"}, {"index": 662, "start": 3355.2000000000003, "end": 3364.7200000000003, "timestamp": "55:55", "endTimestamp": "56:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=3355s", "text": "and we really need a better theory of why things like the one I've shown you before are possible."}, {"index": 663, "start": 3365.48, "end": 3370.86, "timestamp": "56:05", "endTimestamp": "56:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=3365s", "text": "And so there is lots of room for developing a better theory in this space."}, {"index": 664, "start": 3370.86, "end": 3375.46, "timestamp": "56:11", "endTimestamp": "56:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=3370s", "text": "And we'll also be suggesting possible projects,"}, {"index": 665, "start": 3375.46, "end": 3380.84, "timestamp": "56:15", "endTimestamp": "56:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=3375s", "text": "so look out for some information about possible projects"}, {"index": 666, "start": 3380.84, "end": 3384.42, "timestamp": "56:21", "endTimestamp": "56:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=3380s", "text": "that can be suggested by TAs or other faculty on campus."}, {"index": 667, "start": 3385.58, "end": 3391.1800000000003, "timestamp": "56:26", "endTimestamp": "56:31", "url": "https://youtu.be/XZ0PMRWXBEU?t=3385s", "text": "And we are able to provide some Google Cloud coupons."}, {"index": 668, "start": 3391.56, "end": 3394.1, "timestamp": "56:32", "endTimestamp": "56:34", "url": "https://youtu.be/XZ0PMRWXBEU?t=3391s", "text": "Not much, unfortunately, but at least a little bit."}, {"index": 669, "start": 3394.9, "end": 3398.1, "timestamp": "56:35", "endTimestamp": "56:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=3394s", "text": "And so we'll figure out a way to distribute them to students."}, {"index": 670, "start": 3398.1, "end": 3404.16, "timestamp": "56:38", "endTimestamp": "56:44", "url": "https://youtu.be/XZ0PMRWXBEU?t=3398s", "text": "And if you want to get some inspiration for what kind of projects people worked on in previous years,"}, {"index": 671, "start": 3404.3199999999997, "end": 3410.7599999999998, "timestamp": "56:44", "endTimestamp": "56:51", "url": "https://youtu.be/XZ0PMRWXBEU?t=3404s", "text": "you can go to the old versions of the website, the 2019 and 2021 version."}, {"index": 672, "start": 3411.22, "end": 3414.94, "timestamp": "56:51", "endTimestamp": "56:55", "url": "https://youtu.be/XZ0PMRWXBEU?t=3411s", "text": "You can get a sense of the kind of projects people worked on,"}, {"index": 673, "start": 3415.06, "end": 3420.98, "timestamp": "56:55", "endTimestamp": "57:01", "url": "https://youtu.be/XZ0PMRWXBEU?t=3415s", "text": "and so you can get a sense of what's enough for a project,"}, {"index": 674, "start": 3421.2999999999997, "end": 3423.98, "timestamp": "57:01", "endTimestamp": "57:04", "url": "https://youtu.be/XZ0PMRWXBEU?t=3421s", "text": "what worked, what didn't, get some ideas."}, {"index": 675, "start": 3423.98, "end": 3430.82, "timestamp": "57:04", "endTimestamp": "57:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=3423s", "text": "And, yeah, I think that was pretty much what I wanted to cover today."}, {"index": 676, "start": 3431.56, "end": 3434.62, "timestamp": "57:12", "endTimestamp": "57:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=3431s", "text": "And I'm happy to take questions."}, {"index": 677, "start": 3435.04, "end": 3441.76, "timestamp": "57:15", "endTimestamp": "57:22", "url": "https://youtu.be/XZ0PMRWXBEU?t=3435s", "text": "And then next week, we're going to start with the background of the progressive models and so forth."}, {"index": 678, "start": 3441.76, "end": 3443.2000000000003, "timestamp": "57:22", "endTimestamp": "57:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=3441s", "text": "So I really like to show you all the slide."}, {"index": 679, "start": 3443.2000000000003, "end": 3444.6200000000003, "timestamp": "57:23", "endTimestamp": "57:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=3443s", "text": "I'm happy, you know, I'll hear you there."}, {"index": 680, "start": 3444.6200000000003, "end": 3445.28, "timestamp": "57:25", "endTimestamp": "57:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=3444s", "text": "Thank you."}, {"index": 681, "start": 3445.28, "end": 3446.4, "timestamp": "57:25", "endTimestamp": "57:26", "url": "https://youtu.be/XZ0PMRWXBEU?t=3445s", "text": "Thank you."}, {"index": 682, "start": 3446.4, "end": 3476.38, "timestamp": "57:26", "endTimestamp": "57:56", "url": "https://youtu.be/XZ0PMRWXBEU?t=3446s", "text": "Thank you."}];
    const q = document.getElementById('q');
    const results = document.getElementById('results');
    const stats = document.getElementById('stats');
    const clear = document.getElementById('clear');
    const player = document.getElementById('player');
    const nowPlaying = document.getElementById('now-playing');
    function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function highlight(text, terms) {
      let out = escapeHtml(text);
      for (const term of terms.sort((a,b) => b.length - a.length)) {
        if (!term) continue;
        out = out.replace(new RegExp(escapeRe(escapeHtml(term)), 'gi'), m => `<mark>${m}</mark>`);
      }
      return out;
    }
    function parseTerms(query) { return query.toLowerCase().split(/\s+/).filter(Boolean); }
    function render() {
      const query = q.value.trim();
      const terms = parseTerms(query);
      const filtered = terms.length ? segments.filter(s => terms.every(t => s.text.toLowerCase().includes(t))) : segments;
      stats.textContent = terms.length ? `${filtered.length} matching segment${filtered.length === 1 ? '' : 's'} for "${query}"` : `${segments.length} transcript segments`;
      if (!filtered.length) { results.innerHTML = '<div class="empty">No matches. Try fewer words or a related term.</div>'; return; }
      results.innerHTML = filtered.map(s => `<section class="segment"><a class="time" href="${s.url}" data-start="${Math.floor(s.start)}" data-time="${s.timestamp}">${s.timestamp}</a><p class="text">${highlight(s.text, terms)}</p></section>`).join('');
    }
    function jumpVideo(start, timestamp) {
      player.src = `https://www.youtube.com/embed/XZ0PMRWXBEU?rel=0&autoplay=1&start=${start}`;
      nowPlaying.textContent = `Playing from ${timestamp}.`;
      player.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    q.addEventListener('input', render);
    clear.addEventListener('click', () => { q.value = ''; q.focus(); render(); });
    results.addEventListener('click', event => {
      const link = event.target.closest('a[data-start]');
      if (!link) return;
      event.preventDefault();
      jumpVideo(link.dataset.start, link.dataset.time);
    });
    const params = new URLSearchParams(location.search); if (params.has('q')) q.value = params.get('q');
    render();
  </script>
