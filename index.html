  <script>
    const segments = [{"index": 1, "start": 0.0, "end": 5.0, "timestamp": "00:00", "endTimestamp": "00:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=0s", "text": "Welcome."}, {"index": 2, "start": 5.0, "end": 13.0, "timestamp": "00:05", "endTimestamp": "00:13", "url": "https://youtu.be/XZ0PMRWXBEU?t=5s", "text": "I'm super excited to see so many people interested in deep generative models."}, {"index": 3, "start": 13.0, "end": 17.0, "timestamp": "00:13", "endTimestamp": "00:17", "url": "https://youtu.be/XZ0PMRWXBEU?t=13s", "text": "So I'm Stefano, I'm the instructor of this class."}, {"index": 4, "start": 17.0, "end": 20.0, "timestamp": "00:17", "endTimestamp": "00:20", "url": "https://youtu.be/XZ0PMRWXBEU?t=17s", "text": "I've been teaching this course for a few years now."}, {"index": 5, "start": 20.0, "end": 26.0, "timestamp": "00:20", "endTimestamp": "00:26", "url": "https://youtu.be/XZ0PMRWXBEU?t=20s", "text": "I guess we started back when before all the generative AI hype"}, {"index": 6, "start": 26.0, "end": 30.0, "timestamp": "00:26", "endTimestamp": "00:30", "url": "https://youtu.be/XZ0PMRWXBEU?t=26s", "text": "and before this topic was so popular in the industry."}, {"index": 7, "start": 30.0, "end": 37.0, "timestamp": "00:30", "endTimestamp": "00:37", "url": "https://youtu.be/XZ0PMRWXBEU?t=30s", "text": "And so now you're lucky, you get to experience a pretty mature version of this course."}, {"index": 8, "start": 37.0, "end": 42.0, "timestamp": "00:37", "endTimestamp": "00:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=37s", "text": "And it's going to be a pretty exciting quarter."}, {"index": 9, "start": 42.0, "end": 47.0, "timestamp": "00:42", "endTimestamp": "00:47", "url": "https://youtu.be/XZ0PMRWXBEU?t=42s", "text": "This is one of the hottest topics in industry right now."}, {"index": 10, "start": 47.0, "end": 50.0, "timestamp": "00:47", "endTimestamp": "00:50", "url": "https://youtu.be/XZ0PMRWXBEU?t=47s", "text": "There is of course a lot of excitement around the language models,"}, {"index": 11, "start": 50.0, "end": 53.0, "timestamp": "00:50", "endTimestamp": "00:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=50s", "text": "about generative models of images, of videos."}, {"index": 12, "start": 53.0, "end": 57.0, "timestamp": "00:53", "endTimestamp": "00:57", "url": "https://youtu.be/XZ0PMRWXBEU?t=53s", "text": "And the goal of this class is to give you really the foundations"}, {"index": 13, "start": 57.0, "end": 64.0, "timestamp": "00:57", "endTimestamp": "01:04", "url": "https://youtu.be/XZ0PMRWXBEU?t=57s", "text": "to understand how the methods that are used in industry and in academic papers actually work."}, {"index": 14, "start": 64.0, "end": 72.0, "timestamp": "01:04", "endTimestamp": "01:12", "url": "https://youtu.be/XZ0PMRWXBEU?t=64s", "text": "And hopefully get up to speed with all the really fundamental concepts that you need"}, {"index": 15, "start": 72.0, "end": 74.0, "timestamp": "01:12", "endTimestamp": "01:14", "url": "https://youtu.be/XZ0PMRWXBEU?t=72s", "text": "in order to build a generative model."}, {"index": 16, "start": 74.0, "end": 79.0, "timestamp": "01:14", "endTimestamp": "01:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=74s", "text": "And maybe in the future develop better systems, develop better models,"}, {"index": 17, "start": 79.0, "end": 86.0, "timestamp": "01:19", "endTimestamp": "01:26", "url": "https://youtu.be/XZ0PMRWXBEU?t=79s", "text": "deploy them in industry, start your own company that is sort of like leveraging these technologies."}, {"index": 18, "start": 86.0, "end": 97.0, "timestamp": "01:26", "endTimestamp": "01:37", "url": "https://youtu.be/XZ0PMRWXBEU?t=86s", "text": "So at a high level, you know, one of the reasons I think these models are becoming so important in AI and machine learning"}, {"index": 19, "start": 97.0, "end": 104.0, "timestamp": "01:37", "endTimestamp": "01:44", "url": "https://youtu.be/XZ0PMRWXBEU?t=97s", "text": "is that they really address kind of like the fundamental challenge that we encounter in a lot of subfields of AI,"}, {"index": 20, "start": 104.0, "end": 112.0, "timestamp": "01:44", "endTimestamp": "01:52", "url": "https://youtu.be/XZ0PMRWXBEU?t=104s", "text": "like computer vision, NLP, computational speech, even robotics, and so forth."}, {"index": 21, "start": 112.0, "end": 123.0, "timestamp": "01:52", "endTimestamp": "02:03", "url": "https://youtu.be/XZ0PMRWXBEU?t=112s", "text": "If you think about it in a lot of these settings, the fundamental challenge that you have is to make sense of some complex high dimensional signal or object,"}, {"index": 22, "start": 123.0, "end": 132.0, "timestamp": "02:03", "endTimestamp": "02:12", "url": "https://youtu.be/XZ0PMRWXBEU?t=123s", "text": "like an image or a speech signal or a sequence of tokens or a sequence of characters written in some language."}, {"index": 23, "start": 132.0, "end": 138.0, "timestamp": "02:12", "endTimestamp": "02:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=132s", "text": "And this is challenging because, you know, from the perspective of a computer, if you think about an image,"}, {"index": 24, "start": 138.0, "end": 140.0, "timestamp": "02:18", "endTimestamp": "02:20", "url": "https://youtu.be/XZ0PMRWXBEU?t=138s", "text": "it's just like a big matrix of numbers."}, {"index": 25, "start": 140.0, "end": 147.0, "timestamp": "02:20", "endTimestamp": "02:27", "url": "https://youtu.be/XZ0PMRWXBEU?t=140s", "text": "And the difficulty is making sense of it, trying to figure out how to map that very complex high dimensional object"}, {"index": 26, "start": 147.0, "end": 156.0, "timestamp": "02:27", "endTimestamp": "02:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=147s", "text": "to some kind of representation that is useful for decision making, for a variety of tasks that we care about,"}, {"index": 27, "start": 156.0, "end": 162.0, "timestamp": "02:36", "endTimestamp": "02:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=156s", "text": "like figuring out what kind of objects are in the image or what kind of relationships they are in,"}, {"index": 28, "start": 162.0, "end": 167.0, "timestamp": "02:42", "endTimestamp": "02:47", "url": "https://youtu.be/XZ0PMRWXBEU?t=162s", "text": "what kind of materials they are made of, if they are moving, how fast, things like that."}, {"index": 29, "start": 167.0, "end": 171.0, "timestamp": "02:47", "endTimestamp": "02:51", "url": "https://youtu.be/XZ0PMRWXBEU?t=167s", "text": "And, you know, similarly, if you think about NLP, it's a similar story."}, {"index": 30, "start": 171.0, "end": 174.0, "timestamp": "02:51", "endTimestamp": "02:54", "url": "https://youtu.be/XZ0PMRWXBEU?t=171s", "text": "You have a sequence of characters and you need to make sense of it."}, {"index": 31, "start": 174.0, "end": 179.0, "timestamp": "02:54", "endTimestamp": "02:59", "url": "https://youtu.be/XZ0PMRWXBEU?t=174s", "text": "You need to understand what's the meaning, and maybe you want to translate it in a different language."}, {"index": 32, "start": 179.0, "end": 185.0, "timestamp": "02:59", "endTimestamp": "03:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=179s", "text": "The challenge is really understanding what these complex objects really mean."}, {"index": 33, "start": 185.0, "end": 189.0, "timestamp": "03:05", "endTimestamp": "03:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=185s", "text": "And understanding these objects is hard."}, {"index": 34, "start": 189.0, "end": 193.0, "timestamp": "03:09", "endTimestamp": "03:13", "url": "https://youtu.be/XZ0PMRWXBEU?t=189s", "text": "It's not even clear what it means to understand what an image means."}, {"index": 35, "start": 193.0, "end": 199.0, "timestamp": "03:13", "endTimestamp": "03:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=193s", "text": "But I like to use this analogy inspired by this quote from Richard Feynman."}, {"index": 36, "start": 199.0, "end": 204.0, "timestamp": "03:19", "endTimestamp": "03:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=199s", "text": "At some point he said, what I cannot create, I do not understand."}, {"index": 37, "start": 204.0, "end": 209.0, "timestamp": "03:24", "endTimestamp": "03:29", "url": "https://youtu.be/XZ0PMRWXBEU?t=204s", "text": "I think this was actually what they found on his whiteboard after he passed."}, {"index": 38, "start": 209.0, "end": 216.0, "timestamp": "03:29", "endTimestamp": "03:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=209s", "text": "And, you know, what he meant in this case is that he was talking about mathematical theorems,"}, {"index": 39, "start": 216.0, "end": 223.0, "timestamp": "03:36", "endTimestamp": "03:43", "url": "https://youtu.be/XZ0PMRWXBEU?t=216s", "text": "and he was saying, if I can't really derive a proof by myself, I'm not really understanding the concept well enough."}, {"index": 40, "start": 223.0, "end": 243.0, "timestamp": "03:43", "endTimestamp": "04:03", "url": "https://youtu.be/XZ0PMRWXBEU?t=223s", "text": "But I think the analogy is that we can look at the contrapositive of this and kind of like the philosophy behind generative modeling approaches in AI is that if I claim I'm able to understand what an image means or what a piece of text means, then I should be able to create it."}, {"index": 41, "start": 243.0, "end": 247.0, "timestamp": "04:03", "endTimestamp": "04:07", "url": "https://youtu.be/XZ0PMRWXBEU?t=243s", "text": "I should be able to generate new images, I should be able to generate new text."}, {"index": 42, "start": 247.0, "end": 253.0, "timestamp": "04:07", "endTimestamp": "04:13", "url": "https://youtu.be/XZ0PMRWXBEU?t=247s", "text": "So if you claim you understand what an apple is, then you should be able to kind of like picture one in your head."}, {"index": 43, "start": 253.0, "end": 258.0, "timestamp": "04:13", "endTimestamp": "04:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=253s", "text": "Maybe you're not able to create a photo of an apple, but you know sort of like what it means."}, {"index": 44, "start": 258.0, "end": 269.0, "timestamp": "04:18", "endTimestamp": "04:29", "url": "https://youtu.be/XZ0PMRWXBEU?t=258s", "text": "Or if you claim you can speak Italian, then you should be able to sort of like produce, you should be able to speak in that language, you should be able to write text in that language."}, {"index": 45, "start": 269.0, "end": 278.0, "timestamp": "04:29", "endTimestamp": "04:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=269s", "text": "And that's kind of like the philosophy behind this idea of building generative models of images or generative models of text or multimodal generative models."}, {"index": 46, "start": 278.0, "end": 288.0, "timestamp": "04:38", "endTimestamp": "04:48", "url": "https://youtu.be/XZ0PMRWXBEU?t=278s", "text": "If you have these kind of capabilities, so you're able to generate text that is coherent, it makes sense, like in large language models like chat GPT, those kind of things."}, {"index": 47, "start": 288.0, "end": 301.0, "timestamp": "04:48", "endTimestamp": "05:01", "url": "https://youtu.be/XZ0PMRWXBEU?t=288s", "text": "And it probably means that you have a certain level of understanding, not only of the rules, the grammar of the language, but also about common sense, about what's going on in the world."}, {"index": 48, "start": 301.0, "end": 309.0, "timestamp": "05:01", "endTimestamp": "05:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=301s", "text": "And essentially the only way you can do a good job of generating text that is meaningful is to have a certain level of understanding."}, {"index": 49, "start": 309.0, "end": 317.0, "timestamp": "05:09", "endTimestamp": "05:17", "url": "https://youtu.be/XZ0PMRWXBEU?t=309s", "text": "And if you have that level of understanding, then you can leverage it and you can use it to solve all the tasks that we care about."}, {"index": 50, "start": 317.0, "end": 328.0, "timestamp": "05:17", "endTimestamp": "05:28", "url": "https://youtu.be/XZ0PMRWXBEU?t=317s", "text": "So how do we go about building software, writing code that can generate, let's say, images or can generate text?"}, {"index": 51, "start": 328.0, "end": 333.0, "timestamp": "05:28", "endTimestamp": "05:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=328s", "text": "You know, this is not necessarily a new problem."}, {"index": 52, "start": 333.0, "end": 336.0, "timestamp": "05:33", "endTimestamp": "05:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=333s", "text": "It's not something that we are looking at for the first time."}, {"index": 53, "start": 336.0, "end": 344.0, "timestamp": "05:36", "endTimestamp": "05:44", "url": "https://youtu.be/XZ0PMRWXBEU?t=336s", "text": "People in computer graphics, for example, have been thinking about writing code that can generate images for a very long time."}, {"index": 54, "start": 344.0, "end": 347.0, "timestamp": "05:44", "endTimestamp": "05:47", "url": "https://youtu.be/XZ0PMRWXBEU?t=344s", "text": "And they made a lot of progress in this space."}, {"index": 55, "start": 347.0, "end": 355.0, "timestamp": "05:47", "endTimestamp": "05:55", "url": "https://youtu.be/XZ0PMRWXBEU?t=347s", "text": "And so you can kind of think of the setting as something like where you're given a high level description of a scene."}, {"index": 56, "start": 355.0, "end": 360.0, "timestamp": "05:55", "endTimestamp": "06:00", "url": "https://youtu.be/XZ0PMRWXBEU?t=355s", "text": "Maybe there are different kinds of objects of different colors, different shapes."}, {"index": 57, "start": 360.0, "end": 362.0, "timestamp": "06:00", "endTimestamp": "06:02", "url": "https://youtu.be/XZ0PMRWXBEU?t=360s", "text": "Maybe you have a viewpoint."}, {"index": 58, "start": 362.0, "end": 373.0, "timestamp": "06:02", "endTimestamp": "06:13", "url": "https://youtu.be/XZ0PMRWXBEU?t=362s", "text": "And the goal is to kind of like write a renderer that can produce an image that corresponds to that high level description."}, {"index": 59, "start": 373.0, "end": 390.0, "timestamp": "06:13", "endTimestamp": "06:30", "url": "https://youtu.be/XZ0PMRWXBEU?t=373s", "text": "And again, the idea is that if you can do this, then you probably have a reasonable understanding of what it means, what the concept of a cube is, what the concept of a cylinder is, what colors mean, relative position."}, {"index": 60, "start": 390.0, "end": 397.0, "timestamp": "06:30", "endTimestamp": "06:37", "url": "https://youtu.be/XZ0PMRWXBEU?t=390s", "text": "And in fact, if you can do this well, then you can imagine a procedure where you try to invert this process."}, {"index": 61, "start": 397.0, "end": 405.0, "timestamp": "06:37", "endTimestamp": "06:45", "url": "https://youtu.be/XZ0PMRWXBEU?t=397s", "text": "And you know, given an image, you can try to figure out what was the high level description that produced this scene."}, {"index": 62, "start": 405.0, "end": 417.0, "timestamp": "06:45", "endTimestamp": "06:57", "url": "https://youtu.be/XZ0PMRWXBEU?t=405s", "text": "And to the extent that you don't have sort of like computational constraints and you can do this efficiently, this gives you a way to think about computer vision in terms of inverse graphics."}, {"index": 63, "start": 417.0, "end": 433.0, "timestamp": "06:57", "endTimestamp": "07:13", "url": "https://youtu.be/XZ0PMRWXBEU?t=417s", "text": "So if you have a process that can generate images well, and you are somehow able to invert it, then you are making progress towards computer vision tasks because you are able to really understand these high level descriptions of the scenes."}, {"index": 64, "start": 433.0, "end": 438.0, "timestamp": "07:13", "endTimestamp": "07:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=433s", "text": "And this is not going to be a course on computer graphics."}, {"index": 65, "start": 438.0, "end": 443.0, "timestamp": "07:18", "endTimestamp": "07:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=438s", "text": "We are going to be looking at very different kind of models, but they will have a similar structure."}, {"index": 66, "start": 443.0, "end": 447.0, "timestamp": "07:23", "endTimestamp": "07:27", "url": "https://youtu.be/XZ0PMRWXBEU?t=443s", "text": "Many of them will have a similar structure where there is going to be a generative component."}, {"index": 67, "start": 447.0, "end": 455.0, "timestamp": "07:27", "endTimestamp": "07:35", "url": "https://youtu.be/XZ0PMRWXBEU?t=447s", "text": "And then often there is going to be latent variables that you can kind of like infer given the raw sensory inputs in this case."}, {"index": 68, "start": 455.0, "end": 460.0, "timestamp": "07:35", "endTimestamp": "07:40", "url": "https://youtu.be/XZ0PMRWXBEU?t=455s", "text": "And you can use that to get features, to get representations."}, {"index": 69, "start": 460.0, "end": 466.0, "timestamp": "07:40", "endTimestamp": "07:46", "url": "https://youtu.be/XZ0PMRWXBEU?t=460s", "text": "You can use them to fine tune your models, to solve computer vision tasks."}, {"index": 70, "start": 466.0, "end": 475.0, "timestamp": "07:46", "endTimestamp": "07:55", "url": "https://youtu.be/XZ0PMRWXBEU?t=466s", "text": "And so this kind of philosophy and this kind of structure will actually show up in the kind of models that we'll build in the class."}, {"index": 71, "start": 475.0, "end": 480.0, "timestamp": "07:55", "endTimestamp": "08:00", "url": "https://youtu.be/XZ0PMRWXBEU?t=475s", "text": "So the kind of models we're going to work on, they are not graphics based."}, {"index": 72, "start": 480.0, "end": 482.0, "timestamp": "08:00", "endTimestamp": "08:02", "url": "https://youtu.be/XZ0PMRWXBEU?t=480s", "text": "They are going to be statistical models."}, {"index": 73, "start": 482.0, "end": 488.0, "timestamp": "08:02", "endTimestamp": "08:08", "url": "https://youtu.be/XZ0PMRWXBEU?t=482s", "text": "So we're only going to be talking about models that are based on machine learning techniques."}, {"index": 74, "start": 488.0, "end": 495.0, "timestamp": "08:08", "endTimestamp": "08:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=488s", "text": "And so the generative models that we're going to work with are going to be based on a combination of data and prior knowledge."}, {"index": 75, "start": 495.0, "end": 500.0, "timestamp": "08:15", "endTimestamp": "08:20", "url": "https://youtu.be/XZ0PMRWXBEU?t=495s", "text": "And so, you know, priors are always necessary."}, {"index": 76, "start": 500.0, "end": 503.0, "timestamp": "08:20", "endTimestamp": "08:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=500s", "text": "But you can imagine that there is a spectrum, right?"}, {"index": 77, "start": 503.0, "end": 505.0, "timestamp": "08:23", "endTimestamp": "08:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=503s", "text": "You can rely more on data."}, {"index": 78, "start": 505.0, "end": 507.0, "timestamp": "08:25", "endTimestamp": "08:27", "url": "https://youtu.be/XZ0PMRWXBEU?t=505s", "text": "You can rely more on priors."}, {"index": 79, "start": 507.0, "end": 513.0, "timestamp": "08:27", "endTimestamp": "08:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=507s", "text": "And you can kind of like think of computer graphics as sort of like lying on this extreme,"}, {"index": 80, "start": 513.0, "end": 522.0, "timestamp": "08:33", "endTimestamp": "08:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=513s", "text": "where you leverage a lot of knowledge about physics, about light transport, about properties of objects to come up with good renderers."}, {"index": 81, "start": 522.0, "end": 531.0, "timestamp": "08:42", "endTimestamp": "08:51", "url": "https://youtu.be/XZ0PMRWXBEU?t=522s", "text": "This course is going to be focusing on methods that are much more data driven, where we're going to be trying to use as little prior knowledge as possible,"}, {"index": 82, "start": 531.0, "end": 534.0, "timestamp": "08:51", "endTimestamp": "08:54", "url": "https://youtu.be/XZ0PMRWXBEU?t=531s", "text": "and instead leverage data."}, {"index": 83, "start": 534.0, "end": 539.0, "timestamp": "08:54", "endTimestamp": "08:59", "url": "https://youtu.be/XZ0PMRWXBEU?t=534s", "text": "Large data sets of images or text, perhaps collected on the internet."}, {"index": 84, "start": 539.0, "end": 556.0, "timestamp": "08:59", "endTimestamp": "09:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=539s", "text": "And, yeah, so at a very high level, these generative models are just going to be probability distributions over, let's say, images x, or over sequences of text x."}, {"index": 85, "start": 556.0, "end": 558.0, "timestamp": "09:16", "endTimestamp": "09:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=556s", "text": "And so in that sense, they are statistical."}, {"index": 86, "start": 558.0, "end": 567.0, "timestamp": "09:18", "endTimestamp": "09:27", "url": "https://youtu.be/XZ0PMRWXBEU?t=558s", "text": "And we're going to be building these models using a combination of data, which you can think of as samples from this probability distribution."}, {"index": 87, "start": 567.0, "end": 575.0, "timestamp": "09:27", "endTimestamp": "09:35", "url": "https://youtu.be/XZ0PMRWXBEU?t=567s", "text": "And in this case, the prior knowledge is basically going to be a mix of the kind of architectures you're going to be using,"}, {"index": 88, "start": 575.0, "end": 578.0, "timestamp": "09:35", "endTimestamp": "09:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=575s", "text": "the kind of loss functions that you're going to be using for training the models,"}, {"index": 89, "start": 578.0, "end": 585.0, "timestamp": "09:38", "endTimestamp": "09:45", "url": "https://youtu.be/XZ0PMRWXBEU?t=578s", "text": "the kind of optimizer that you're going to be using to try to produce the loss function as much as possible."}, {"index": 90, "start": 585.0, "end": 598.0, "timestamp": "09:45", "endTimestamp": "09:58", "url": "https://youtu.be/XZ0PMRWXBEU?t=585s", "text": "And this combination, having access to good data and the right kind of like priors, is what enables you to build, hopefully, a good statistical generative model."}, {"index": 91, "start": 598.0, "end": 605.0, "timestamp": "09:58", "endTimestamp": "10:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=598s", "text": "But at the end of the day, kind of like the abstraction is that we're going to be working with probability distributions."}, {"index": 92, "start": 605.0, "end": 614.0, "timestamp": "10:05", "endTimestamp": "10:14", "url": "https://youtu.be/XZ0PMRWXBEU?t=605s", "text": "And you can just think of it as a function that takes any input x as input, let's say any image, and maps it to some kind of like scalar probability value,"}, {"index": 93, "start": 614.0, "end": 623.0, "timestamp": "10:14", "endTimestamp": "10:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=614s", "text": "which basically tells you how likely is this particular input image x according to my generative model."}, {"index": 94, "start": 623.0, "end": 629.0, "timestamp": "10:23", "endTimestamp": "10:29", "url": "https://youtu.be/XZ0PMRWXBEU?t=623s", "text": "And this might not look like a generative model directly."}, {"index": 95, "start": 629.0, "end": 634.0, "timestamp": "10:29", "endTimestamp": "10:34", "url": "https://youtu.be/XZ0PMRWXBEU?t=629s", "text": "It looks like how do you actually generate data if you have access to this kind of object."}, {"index": 96, "start": 634.0, "end": 641.0, "timestamp": "10:34", "endTimestamp": "10:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=634s", "text": "The idea is that you can basically generate samples from this probability distribution to create new objects."}, {"index": 97, "start": 641.0, "end": 646.0, "timestamp": "10:41", "endTimestamp": "10:46", "url": "https://youtu.be/XZ0PMRWXBEU?t=641s", "text": "So you train a model, you learn this probability distribution, and then you sample from it."}, {"index": 98, "start": 646.0, "end": 655.0, "timestamp": "10:46", "endTimestamp": "10:55", "url": "https://youtu.be/XZ0PMRWXBEU?t=646s", "text": "And by doing that, you generate new images that hopefully look like the ones you've used for training the model."}, {"index": 99, "start": 655.0, "end": 657.0, "timestamp": "10:55", "endTimestamp": "10:57", "url": "https://youtu.be/XZ0PMRWXBEU?t=655s", "text": "So that's the structure."}, {"index": 100, "start": 657.0, "end": 662.0, "timestamp": "10:57", "endTimestamp": "11:02", "url": "https://youtu.be/XZ0PMRWXBEU?t=657s", "text": "So in some sense, what we're trying to do is we're trying to build data simulators."}, {"index": 101, "start": 662.0, "end": 667.0, "timestamp": "11:02", "endTimestamp": "11:07", "url": "https://youtu.be/XZ0PMRWXBEU?t=662s", "text": "So we often think of data as an input to our machine learning problems."}, {"index": 102, "start": 667.0, "end": 673.0, "timestamp": "11:07", "endTimestamp": "11:13", "url": "https://youtu.be/XZ0PMRWXBEU?t=667s", "text": "Here we're kind of like changing, turning things around, and we're thinking of data as being an output."}, {"index": 103, "start": 673.0, "end": 681.0, "timestamp": "11:13", "endTimestamp": "11:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=673s", "text": "So we need to think about different kinds of machine learning models that we can use to simulate, to generate data."}, {"index": 104, "start": 681.0, "end": 686.0, "timestamp": "11:21", "endTimestamp": "11:26", "url": "https://youtu.be/XZ0PMRWXBEU?t=681s", "text": "Of course, this looks a little bit weird because we just said we're going to use data to build these models."}, {"index": 105, "start": 686.0, "end": 693.0, "timestamp": "11:26", "endTimestamp": "11:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=686s", "text": "So indeed, you know, the idea is that we're going to use data to build a model that then we can use to generate new data."}, {"index": 106, "start": 693.0, "end": 702.0, "timestamp": "11:33", "endTimestamp": "11:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=693s", "text": "And this is useful because often we're going to be interested in simulators that we can control through control signals."}, {"index": 107, "start": 702.0, "end": 710.0, "timestamp": "11:42", "endTimestamp": "11:50", "url": "https://youtu.be/XZ0PMRWXBEU?t=702s", "text": "And we'll see some examples of the kind of control signals you might want to use to control your generative process."}, {"index": 108, "start": 710.0, "end": 719.0, "timestamp": "11:50", "endTimestamp": "11:59", "url": "https://youtu.be/XZ0PMRWXBEU?t=710s", "text": "For example, you might have a model that can generate images, and you can control it by providing a caption of the kind of images you want."}, {"index": 109, "start": 719.0, "end": 731.0, "timestamp": "11:59", "endTimestamp": "12:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=719s", "text": "Or you might have a model that can, again, generate images, and you can control it by providing maybe black and white images, and you can use it to produce a colorized version of the image."}, {"index": 110, "start": 731.0, "end": 741.0, "timestamp": "12:11", "endTimestamp": "12:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=731s", "text": "Or maybe you have a data simulator that can produce text in English, and you can control the generative process by feeding in text in a different language, maybe in Chinese."}, {"index": 111, "start": 741.0, "end": 747.0, "timestamp": "12:21", "endTimestamp": "12:27", "url": "https://youtu.be/XZ0PMRWXBEU?t=741s", "text": "That's how you build machine translation tools."}, {"index": 112, "start": 747.0, "end": 751.0, "timestamp": "12:27", "endTimestamp": "12:31", "url": "https://youtu.be/XZ0PMRWXBEU?t=747s", "text": "The API is going to be, again, that of a probability distribution."}, {"index": 113, "start": 751.0, "end": 760.0, "timestamp": "12:31", "endTimestamp": "12:40", "url": "https://youtu.be/XZ0PMRWXBEU?t=751s", "text": "So really, you're going to be able to, for a lot of these models, you're going to be able to also query the model with potential data points."}, {"index": 114, "start": 760.0, "end": 766.0, "timestamp": "12:40", "endTimestamp": "12:46", "url": "https://youtu.be/XZ0PMRWXBEU?t=760s", "text": "And the model will be able to tell you whether or not they are likely to be generated by this data simulator or not."}, {"index": 115, "start": 766.0, "end": 776.0, "timestamp": "12:46", "endTimestamp": "12:56", "url": "https://youtu.be/XZ0PMRWXBEU?t=766s", "text": "So in some sense, it also allows you to build a sort of understanding over what kind of data points make sense and which ones don't, which is going to be useful for some applications."}, {"index": 116, "start": 776.0, "end": 781.0, "timestamp": "12:56", "endTimestamp": "13:01", "url": "https://youtu.be/XZ0PMRWXBEU?t=776s", "text": "And really, this data simulator is, at the end of the day, a statistical model."}, {"index": 117, "start": 781.0, "end": 784.0, "timestamp": "13:01", "endTimestamp": "13:04", "url": "https://youtu.be/XZ0PMRWXBEU?t=781s", "text": "It's what we call in machine learning a generative model."}, {"index": 118, "start": 784.0, "end": 788.0, "timestamp": "13:04", "endTimestamp": "13:08", "url": "https://youtu.be/XZ0PMRWXBEU?t=784s", "text": "And in particular, in this class, we're going to be thinking about deep generative models,"}, {"index": 119, "start": 788.0, "end": 799.0, "timestamp": "13:08", "endTimestamp": "13:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=788s", "text": "where we're going to be using neural networks, deep learning kind of ideas to implement this piece of code that gives you these capabilities of generating data."}, {"index": 120, "start": 799.0, "end": 811.0, "timestamp": "13:19", "endTimestamp": "13:31", "url": "https://youtu.be/XZ0PMRWXBEU?t=799s", "text": "And to give you a few examples, if you have a generative model of images, you might be able to control it, let's say, using sketches."}, {"index": 121, "start": 811.0, "end": 821.0, "timestamp": "13:31", "endTimestamp": "13:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=811s", "text": "Maybe you're not good at painting, and you can only produce a rough sketch of a bedroom, and then you fit it as a control signal into your generative model,"}, {"index": 122, "start": 821.0, "end": 831.0, "timestamp": "13:41", "endTimestamp": "13:51", "url": "https://youtu.be/XZ0PMRWXBEU?t=821s", "text": "and you can use it to produce realistic images that have the structure of the stroke painting that you provide, but they look much better."}, {"index": 123, "start": 831.0, "end": 838.0, "timestamp": "13:51", "endTimestamp": "13:58", "url": "https://youtu.be/XZ0PMRWXBEU?t=831s", "text": "Or you can do maybe text-to-image kind of things, where if you have a generative model that has been trained on paintings,"}, {"index": 124, "start": 838.0, "end": 848.0, "timestamp": "13:58", "endTimestamp": "14:08", "url": "https://youtu.be/XZ0PMRWXBEU?t=838s", "text": "then you can control it through captions, and you can ask the model to generate a new painting that corresponds to the description that is provided by the user."}, {"index": 125, "start": 848.0, "end": 858.0, "timestamp": "14:08", "endTimestamp": "14:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=848s", "text": "Other examples that you might not think about immediately could be something like you have a generative model over medical images."}, {"index": 126, "start": 858.0, "end": 864.0, "timestamp": "14:18", "endTimestamp": "14:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=858s", "text": "And in this case, you might use an actual signal coming from an MRI machine or a CT scan machine,"}, {"index": 127, "start": 864.0, "end": 871.0, "timestamp": "14:24", "endTimestamp": "14:31", "url": "https://youtu.be/XZ0PMRWXBEU?t=864s", "text": "and you can use that signal to sort of reconstruct the medical image, the thing you actually care about,"}, {"index": 128, "start": 871.0, "end": 876.0, "timestamp": "14:31", "endTimestamp": "14:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=871s", "text": "given this kind of measurement that is coming from an actual machine."}, {"index": 129, "start": 876.0, "end": 882.0, "timestamp": "14:36", "endTimestamp": "14:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=876s", "text": "And in this kind of application, generative models have shown to be very effective,"}, {"index": 130, "start": 882.0, "end": 890.0, "timestamp": "14:42", "endTimestamp": "14:50", "url": "https://youtu.be/XZ0PMRWXBEU?t=882s", "text": "because they can reduce kind of like the number of measurements, the amount of radiation that you have to give to the patient"}, {"index": 131, "start": 890.0, "end": 897.0, "timestamp": "14:50", "endTimestamp": "14:57", "url": "https://youtu.be/XZ0PMRWXBEU?t=890s", "text": "to get a measurement that is good enough to produce the medical images that the doctor needs to come up with a diagnosis."}, {"index": 132, "start": 897.0, "end": 906.0, "timestamp": "14:57", "endTimestamp": "15:06", "url": "https://youtu.be/XZ0PMRWXBEU?t=897s", "text": "An example of the kind of thing you can do if you can evaluate probabilities is to do outlier detection."}, {"index": 133, "start": 906.0, "end": 910.0, "timestamp": "15:06", "endTimestamp": "15:10", "url": "https://youtu.be/XZ0PMRWXBEU?t=906s", "text": "Actually, they're going to be playing with this in the homework, a variant of this."}, {"index": 134, "start": 910.0, "end": 916.0, "timestamp": "15:10", "endTimestamp": "15:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=910s", "text": "If you have a generative model that understands traffic signs, you might be able to say,"}, {"index": 135, "start": 916.0, "end": 921.0, "timestamp": "15:16", "endTimestamp": "15:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=916s", "text": "OK, this looks like a reasonable traffic sign you might encounter on the streets."}, {"index": 136, "start": 921.0, "end": 925.0, "timestamp": "15:21", "endTimestamp": "15:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=921s", "text": "Well, if I feed you something like this, some kind of adversarial example,"}, {"index": 137, "start": 925.0, "end": 932.0, "timestamp": "15:25", "endTimestamp": "15:32", "url": "https://youtu.be/XZ0PMRWXBEU?t=925s", "text": "somebody's trying to cause trouble to your self-driving vehicle, the model might be able to say,"}, {"index": 138, "start": 932.0, "end": 938.0, "timestamp": "15:32", "endTimestamp": "15:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=932s", "text": "no, this looks like a low probability thing, this is weird, do something about it, maybe don't trust it,"}, {"index": 139, "start": 938.0, "end": 941.0, "timestamp": "15:38", "endTimestamp": "15:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=938s", "text": "ask a human for help, or something like that."}, {"index": 140, "start": 941.0, "end": 947.0, "timestamp": "15:41", "endTimestamp": "15:47", "url": "https://youtu.be/XZ0PMRWXBEU?t=941s", "text": "Right, and this is really an exciting time to study generative models,"}, {"index": 141, "start": 947.0, "end": 953.0, "timestamp": "15:47", "endTimestamp": "15:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=947s", "text": "because there's been a lot of progress over many different modalities."}, {"index": 142, "start": 953.0, "end": 959.0, "timestamp": "15:53", "endTimestamp": "15:59", "url": "https://youtu.be/XZ0PMRWXBEU?t=953s", "text": "I'm going to start with images, because that's where I've done a lot of my research."}, {"index": 143, "start": 959.0, "end": 966.0, "timestamp": "15:59", "endTimestamp": "16:06", "url": "https://youtu.be/XZ0PMRWXBEU?t=959s", "text": "When I started working in this space about 10 years ago, these were the sort of images that we were able to generate."}, {"index": 144, "start": 966.0, "end": 970.0, "timestamp": "16:06", "endTimestamp": "16:10", "url": "https://youtu.be/XZ0PMRWXBEU?t=966s", "text": "And even that was already very, very remarkable."}, {"index": 145, "start": 970.0, "end": 978.0, "timestamp": "16:10", "endTimestamp": "16:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=970s", "text": "People were very surprised that it was possible to train machine learning systems to produce images of people"}, {"index": 146, "start": 978.0, "end": 983.0, "timestamp": "16:18", "endTimestamp": "16:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=978s", "text": "that sort of are black and white, and they roughly had the right shape."}, {"index": 147, "start": 983.0, "end": 986.0, "timestamp": "16:23", "endTimestamp": "16:26", "url": "https://youtu.be/XZ0PMRWXBEU?t=983s", "text": "People were very impressed by those sort of results."}, {"index": 148, "start": 986.0, "end": 993.0, "timestamp": "16:26", "endTimestamp": "16:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=986s", "text": "And you can see that over a few years, this progress was largely driven by generative adversarial networks,"}, {"index": 149, "start": 993.0, "end": 997.0, "timestamp": "16:33", "endTimestamp": "16:37", "url": "https://youtu.be/XZ0PMRWXBEU?t=993s", "text": "which is a class of generative models we're going to be talking about."}, {"index": 150, "start": 997.0, "end": 1002.0, "timestamp": "16:37", "endTimestamp": "16:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=997s", "text": "You can kind of see how the generations are becoming better and better, higher resolution, more detail,"}, {"index": 151, "start": 1002.0, "end": 1005.0, "timestamp": "16:42", "endTimestamp": "16:45", "url": "https://youtu.be/XZ0PMRWXBEU?t=1002s", "text": "more realistic kind of images of people."}, {"index": 152, "start": 1005.0, "end": 1011.0, "timestamp": "16:45", "endTimestamp": "16:51", "url": "https://youtu.be/XZ0PMRWXBEU?t=1005s", "text": "One of the big improvements that happened over the last two or three years,"}, {"index": 153, "start": 1011.0, "end": 1018.0, "timestamp": "16:51", "endTimestamp": "16:58", "url": "https://youtu.be/XZ0PMRWXBEU?t=1011s", "text": "which was actually largely coming out of Stanford, Yang Song, who was a PhD student in my group,"}, {"index": 154, "start": 1018.0, "end": 1024.0, "timestamp": "16:58", "endTimestamp": "17:04", "url": "https://youtu.be/XZ0PMRWXBEU?t=1018s", "text": "came up with this idea of using score-based diffusion models,"}, {"index": 155, "start": 1024.0, "end": 1029.0, "timestamp": "17:04", "endTimestamp": "17:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=1024s", "text": "which is a different kind of generative models that we're also going to be talking about in this course,"}, {"index": 156, "start": 1029.0, "end": 1034.0, "timestamp": "17:09", "endTimestamp": "17:14", "url": "https://youtu.be/XZ0PMRWXBEU?t=1029s", "text": "and was able to further push the state of the art, for example, generating images very high,"}, {"index": 157, "start": 1034.0, "end": 1037.0, "timestamp": "17:14", "endTimestamp": "17:17", "url": "https://youtu.be/XZ0PMRWXBEU?t=1034s", "text": "resolution images that look like this."}, {"index": 158, "start": 1037.0, "end": 1039.0, "timestamp": "17:17", "endTimestamp": "17:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=1037s", "text": "Like these people don't exist."}, {"index": 159, "start": 1039.0, "end": 1045.0, "timestamp": "17:19", "endTimestamp": "17:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=1039s", "text": "They are completely synthesized, generated by one of these generative models."}, {"index": 160, "start": 1045.0, "end": 1057.0, "timestamp": "17:25", "endTimestamp": "17:37", "url": "https://youtu.be/XZ0PMRWXBEU?t=1045s", "text": "And this is really, diffusion models are really the technology that drives a lot of the text-to-image systems that you might have seen."}, {"index": 161, "start": 1057.0, "end": 1069.0, "timestamp": "17:37", "endTimestamp": "17:49", "url": "https://youtu.be/XZ0PMRWXBEU?t=1057s", "text": "Things like stable diffusion, or DALI, or other, or mid-journey, we think are all based on this type of generative model,"}, {"index": 162, "start": 1069.0, "end": 1074.0, "timestamp": "17:49", "endTimestamp": "17:54", "url": "https://youtu.be/XZ0PMRWXBEU?t=1069s", "text": "this way of representing probability distribution based on a diffusion model."}, {"index": 163, "start": 1074.0, "end": 1080.0, "timestamp": "17:54", "endTimestamp": "18:00", "url": "https://youtu.be/XZ0PMRWXBEU?t=1074s", "text": "And once you have a good diffusion model, you can try to control it using captions."}, {"index": 164, "start": 1080.0, "end": 1089.0, "timestamp": "18:00", "endTimestamp": "18:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=1080s", "text": "And now you get this kind of really cool text-to-image systems where you can ask a user for an input."}, {"index": 165, "start": 1089.0, "end": 1095.0, "timestamp": "18:09", "endTimestamp": "18:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=1089s", "text": "What kind of image do you want? A caption of what kind of image the system should be able to produce."}, {"index": 166, "start": 1095.0, "end": 1098.0, "timestamp": "18:15", "endTimestamp": "18:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=1095s", "text": "For example, an astronaut riding a horse."}, {"index": 167, "start": 1098.0, "end": 1104.0, "timestamp": "18:18", "endTimestamp": "18:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=1098s", "text": "And these are the kind of results that you can get with the systems we have today."}, {"index": 168, "start": 1104.0, "end": 1106.0, "timestamp": "18:24", "endTimestamp": "18:26", "url": "https://youtu.be/XZ0PMRWXBEU?t=1104s", "text": "This is really cool."}, {"index": 169, "start": 1106.0, "end": 1110.0, "timestamp": "18:26", "endTimestamp": "18:30", "url": "https://youtu.be/XZ0PMRWXBEU?t=1106s", "text": "I mean, these models have been trained on a lot of data,"}, {"index": 170, "start": 1110.0, "end": 1116.0, "timestamp": "18:30", "endTimestamp": "18:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=1110s", "text": "but presumably they have not seen something like this on the internet."}, {"index": 171, "start": 1116.0, "end": 1119.0, "timestamp": "18:36", "endTimestamp": "18:39", "url": "https://youtu.be/XZ0PMRWXBEU?t=1116s", "text": "They might have seen an astronaut, they definitely have seen a horse,"}, {"index": 172, "start": 1119.0, "end": 1122.0, "timestamp": "18:39", "endTimestamp": "18:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=1119s", "text": "but they probably have not seen those two things together."}, {"index": 173, "start": 1122.0, "end": 1128.0, "timestamp": "18:42", "endTimestamp": "18:48", "url": "https://youtu.be/XZ0PMRWXBEU?t=1122s", "text": "So it's very impressive that the model is able to, sort of like, again, understand the meaning of astronaut,"}, {"index": 174, "start": 1128.0, "end": 1131.0, "timestamp": "18:48", "endTimestamp": "18:51", "url": "https://youtu.be/XZ0PMRWXBEU?t=1128s", "text": "understand the meaning of horse, putting them together."}, {"index": 175, "start": 1131.0, "end": 1139.0, "timestamp": "18:51", "endTimestamp": "18:59", "url": "https://youtu.be/XZ0PMRWXBEU?t=1131s", "text": "And the fact that it's able to generate this kind of picture tells me that there is some level of understanding of what it means,"}, {"index": 176, "start": 1139.0, "end": 1143.0, "timestamp": "18:59", "endTimestamp": "19:03", "url": "https://youtu.be/XZ0PMRWXBEU?t=1139s", "text": "what an astronaut means, and what riding means, what a horse means."}, {"index": 177, "start": 1143.0, "end": 1147.0, "timestamp": "19:03", "endTimestamp": "19:07", "url": "https://youtu.be/XZ0PMRWXBEU?t=1143s", "text": "And even, like, if you look at the landscape, I don't know, it could be,"}, {"index": 178, "start": 1147.0, "end": 1151.0, "timestamp": "19:07", "endTimestamp": "19:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=1147s", "text": "it feels like it's probably on some other planet or something."}, {"index": 179, "start": 1151.0, "end": 1156.0, "timestamp": "19:11", "endTimestamp": "19:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=1151s", "text": "So there is some level of understanding about these concepts that it's showing here."}, {"index": 180, "start": 1156.0, "end": 1163.0, "timestamp": "19:16", "endTimestamp": "19:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=1156s", "text": "And that's super exciting, I think, because it means that we're really making progress in this space"}, {"index": 181, "start": 1163.0, "end": 1166.0, "timestamp": "19:23", "endTimestamp": "19:26", "url": "https://youtu.be/XZ0PMRWXBEU?t=1163s", "text": "and understanding the meaning of text, of images, that relationship."}, {"index": 182, "start": 1166.0, "end": 1173.0, "timestamp": "19:26", "endTimestamp": "19:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=1166s", "text": "And that's what's driving a lot of the successes that we're seeing in ML these days."}, {"index": 183, "start": 1173.0, "end": 1175.0, "timestamp": "19:33", "endTimestamp": "19:35", "url": "https://youtu.be/XZ0PMRWXBEU?t=1173s", "text": "Here's another example."}, {"index": 184, "start": 1175.0, "end": 1181.0, "timestamp": "19:35", "endTimestamp": "19:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=1175s", "text": "If you ask a system on a perfect Italian meal, you get, here I'm generating multiple samples."}, {"index": 185, "start": 1181.0, "end": 1186.0, "timestamp": "19:41", "endTimestamp": "19:46", "url": "https://youtu.be/XZ0PMRWXBEU?t=1181s", "text": "So, because it's a probability distribution, as you can imagine, you can sample from it."}, {"index": 186, "start": 1186.0, "end": 1188.0, "timestamp": "19:46", "endTimestamp": "19:48", "url": "https://youtu.be/XZ0PMRWXBEU?t=1186s", "text": "And it will generate different answers."}, {"index": 187, "start": 1188.0, "end": 1190.0, "timestamp": "19:48", "endTimestamp": "19:50", "url": "https://youtu.be/XZ0PMRWXBEU?t=1188s", "text": "So the generation is stochastic."}, {"index": 188, "start": 1190.0, "end": 1194.0, "timestamp": "19:50", "endTimestamp": "19:54", "url": "https://youtu.be/XZ0PMRWXBEU?t=1190s", "text": "Different random see it, it will produce different outputs every time."}, {"index": 189, "start": 1194.0, "end": 1196.0, "timestamp": "19:54", "endTimestamp": "19:56", "url": "https://youtu.be/XZ0PMRWXBEU?t=1194s", "text": "I see, we can see four of them."}, {"index": 190, "start": 1196.0, "end": 1198.0, "timestamp": "19:56", "endTimestamp": "19:58", "url": "https://youtu.be/XZ0PMRWXBEU?t=1196s", "text": "Again, I think it does a pretty good job."}, {"index": 191, "start": 1198.0, "end": 1205.0, "timestamp": "19:58", "endTimestamp": "20:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=1198s", "text": "I mean, some of the stuff is clearly made up, but it does, it's interesting how it kind of like even captures out of the window"}, {"index": 192, "start": 1205.0, "end": 1213.0, "timestamp": "20:05", "endTimestamp": "20:13", "url": "https://youtu.be/XZ0PMRWXBEU?t=1205s", "text": "the kind of buildings you would probably see in Italy."}, {"index": 193, "start": 1213.0, "end": 1216.0, "timestamp": "20:13", "endTimestamp": "20:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=1213s", "text": "It kind of like has the right flavor, I think."}, {"index": 194, "start": 1216.0, "end": 1219.0, "timestamp": "20:16", "endTimestamp": "20:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=1216s", "text": "It's pretty impressive kind of thing."}, {"index": 195, "start": 1219.0, "end": 1225.0, "timestamp": "20:19", "endTimestamp": "20:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=1219s", "text": "Here's another example from a recent system developed in China."}, {"index": 196, "start": 1225.0, "end": 1232.0, "timestamp": "20:25", "endTimestamp": "20:32", "url": "https://youtu.be/XZ0PMRWXBEU?t=1225s", "text": "This is a teddy bear wearing a costume, standing in front of the Hall of Supreme Harmony and singing a Beijing opera."}, {"index": 197, "start": 1232.0, "end": 1235.0, "timestamp": "20:32", "endTimestamp": "20:35", "url": "https://youtu.be/XZ0PMRWXBEU?t=1232s", "text": "So again, a pretty crazy sort of caption."}, {"index": 198, "start": 1235.0, "end": 1238.0, "timestamp": "20:35", "endTimestamp": "20:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=1235s", "text": "And it produces things like this."}, {"index": 199, "start": 1238.0, "end": 1241.0, "timestamp": "20:38", "endTimestamp": "20:41", "url": "https://youtu.be/XZ0PMRWXBEU?t=1238s", "text": "Pretty impressive."}, {"index": 200, "start": 1245.0, "end": 1250.0, "timestamp": "20:45", "endTimestamp": "20:50", "url": "https://youtu.be/XZ0PMRWXBEU?t=1245s", "text": "And this is the latest that came out very recently."}, {"index": 201, "start": 1250.0, "end": 1253.0, "timestamp": "20:50", "endTimestamp": "20:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=1250s", "text": "We don't know yet what this model is built on."}, {"index": 202, "start": 1253.0, "end": 1257.0, "timestamp": "20:53", "endTimestamp": "20:57", "url": "https://youtu.be/XZ0PMRWXBEU?t=1253s", "text": "Dali3 from OpenAI, this is an example from their blog post."}, {"index": 203, "start": 1257.0, "end": 1261.0, "timestamp": "20:57", "endTimestamp": "21:01", "url": "https://youtu.be/XZ0PMRWXBEU?t=1257s", "text": "Here you're asking the model to generate."}, {"index": 204, "start": 1265.0, "end": 1267.0, "timestamp": "21:05", "endTimestamp": "21:07", "url": "https://youtu.be/XZ0PMRWXBEU?t=1265s", "text": "Well, you can see the caption yourself."}, {"index": 205, "start": 1269.0, "end": 1270.0, "timestamp": "21:09", "endTimestamp": "21:10", "url": "https://youtu.be/XZ0PMRWXBEU?t=1269s", "text": "Pretty cool."}, {"index": 206, "start": 1270.0, "end": 1277.0, "timestamp": "21:10", "endTimestamp": "21:17", "url": "https://youtu.be/XZ0PMRWXBEU?t=1270s", "text": "Again, demonstrates a pretty sophisticated level of understanding of concepts and a good way of combining them together."}, {"index": 207, "start": 1280.0, "end": 1283.0, "timestamp": "21:20", "endTimestamp": "21:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=1280s", "text": "Right, so this is a test to image generation."}, {"index": 208, "start": 1283.0, "end": 1290.0, "timestamp": "21:23", "endTimestamp": "21:30", "url": "https://youtu.be/XZ0PMRWXBEU?t=1283s", "text": "Again, the nice thing about these models is that you can often control them using different kinds of control signals."}, {"index": 209, "start": 1290.0, "end": 1293.0, "timestamp": "21:30", "endTimestamp": "21:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=1290s", "text": "So here we're controlling using text, using captions."}, {"index": 210, "start": 1293.0, "end": 1296.0, "timestamp": "21:33", "endTimestamp": "21:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=1293s", "text": "But there is a lot of inverse problems."}, {"index": 211, "start": 1296.0, "end": 1300.0, "timestamp": "21:36", "endTimestamp": "21:40", "url": "https://youtu.be/XZ0PMRWXBEU?t=1296s", "text": "Again, this is a field that has been studied for a long time."}, {"index": 212, "start": 1300.0, "end": 1307.0, "timestamp": "21:40", "endTimestamp": "21:47", "url": "https://youtu.be/XZ0PMRWXBEU?t=1300s", "text": "People have been thinking about how to colorize an image, how to do super resolution on an image, how to do in-painting on an image."}, {"index": 213, "start": 1307.0, "end": 1320.0, "timestamp": "21:47", "endTimestamp": "22:00", "url": "https://youtu.be/XZ0PMRWXBEU?t=1307s", "text": "These problems become pretty much easier to solve once you have a good system that really understands the relationship between all the pixel values that you typically see in an image."}, {"index": 214, "start": 1321.0, "end": 1326.0, "timestamp": "22:01", "endTimestamp": "22:06", "url": "https://youtu.be/XZ0PMRWXBEU?t=1321s", "text": "And so there's been a lot of progress in, let's say, super resolution."}, {"index": 215, "start": 1326.0, "end": 1330.0, "timestamp": "22:06", "endTimestamp": "22:10", "url": "https://youtu.be/XZ0PMRWXBEU?t=1326s", "text": "You go from low resolution images like this to high resolution images like that."}, {"index": 216, "start": 1330.0, "end": 1331.0, "timestamp": "22:10", "endTimestamp": "22:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=1330s", "text": "Or colorization."}, {"index": 217, "start": 1331.0, "end": 1337.0, "timestamp": "22:11", "endTimestamp": "22:17", "url": "https://youtu.be/XZ0PMRWXBEU?t=1331s", "text": "You can take old black and white photos and you can kind of like colorize them in a meaningful way."}, {"index": 218, "start": 1337.0, "end": 1338.0, "timestamp": "22:17", "endTimestamp": "22:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=1337s", "text": "Or in-painting."}, {"index": 219, "start": 1338.0, "end": 1345.0, "timestamp": "22:18", "endTimestamp": "22:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=1338s", "text": "So if you have an image where some of the pixels are masked out, you can ask the model to fill them in."}, {"index": 220, "start": 1345.0, "end": 1349.0, "timestamp": "22:25", "endTimestamp": "22:29", "url": "https://youtu.be/XZ0PMRWXBEU?t=1345s", "text": "And they do a pretty good job at doing this."}, {"index": 221, "start": 1349.0, "end": 1352.0, "timestamp": "22:29", "endTimestamp": "22:32", "url": "https://youtu.be/XZ0PMRWXBEU?t=1349s", "text": "These are probably not the most up-to-date references."}, {"index": 222, "start": 1352.0, "end": 1358.0, "timestamp": "22:32", "endTimestamp": "22:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=1352s", "text": "But you can kind of get a sense of why these models are so useful in the real world."}, {"index": 223, "start": 1359.0, "end": 1367.0, "timestamp": "22:39", "endTimestamp": "22:47", "url": "https://youtu.be/XZ0PMRWXBEU?t=1359s", "text": "And here's an example from SDEdit, which is one of the things that, again, one of my PhD students developed."}, {"index": 224, "start": 1367.0, "end": 1371.0, "timestamp": "22:47", "endTimestamp": "22:51", "url": "https://youtu.be/XZ0PMRWXBEU?t=1367s", "text": "This is back to the sketch to image, where you can start with a sketch."}, {"index": 225, "start": 1371.0, "end": 1374.0, "timestamp": "22:51", "endTimestamp": "22:54", "url": "https://youtu.be/XZ0PMRWXBEU?t=1371s", "text": "Sort of like a painting or an image that you would like."}, {"index": 226, "start": 1374.0, "end": 1376.0, "timestamp": "22:54", "endTimestamp": "22:56", "url": "https://youtu.be/XZ0PMRWXBEU?t=1374s", "text": "The kind of thing I would be able to do."}, {"index": 227, "start": 1376.0, "end": 1383.0, "timestamp": "22:56", "endTimestamp": "23:03", "url": "https://youtu.be/XZ0PMRWXBEU?t=1376s", "text": "And then you can ask the model to refine it and produce some pretty picture that kind of like has the right structure."}, {"index": 228, "start": 1383.0, "end": 1385.0, "timestamp": "23:03", "endTimestamp": "23:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=1383s", "text": "But that's much nicer."}, {"index": 229, "start": 1385.0, "end": 1388.0, "timestamp": "23:05", "endTimestamp": "23:08", "url": "https://youtu.be/XZ0PMRWXBEU?t=1385s", "text": "I would never be able to produce the image at the bottom."}, {"index": 230, "start": 1388.0, "end": 1391.0, "timestamp": "23:08", "endTimestamp": "23:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=1388s", "text": "But I could probably come up with a sketch you see on the top."}, {"index": 231, "start": 1393.0, "end": 1398.0, "timestamp": "23:13", "endTimestamp": "23:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=1393s", "text": "And yeah, here you can see more examples where you can do sketch to image."}, {"index": 232, "start": 1398.0, "end": 1400.0, "timestamp": "23:18", "endTimestamp": "23:20", "url": "https://youtu.be/XZ0PMRWXBEU?t=1398s", "text": "Or you can do even stroke-based editing."}, {"index": 233, "start": 1400.0, "end": 1409.0, "timestamp": "23:20", "endTimestamp": "23:29", "url": "https://youtu.be/XZ0PMRWXBEU?t=1400s", "text": "Maybe you start with an image and then you want to change it based on some rough sense of what you want the image to have."}, {"index": 234, "start": 1409.0, "end": 1412.0, "timestamp": "23:29", "endTimestamp": "23:32", "url": "https://youtu.be/XZ0PMRWXBEU?t=1409s", "text": "And then the model will make it pretty for you."}, {"index": 235, "start": 1414.0, "end": 1420.0, "timestamp": "23:34", "endTimestamp": "23:40", "url": "https://youtu.be/XZ0PMRWXBEU?t=1414s", "text": "And it doesn't have to be editing or sort of like you don't have to control it through strokes."}, {"index": 236, "start": 1420.0, "end": 1426.0, "timestamp": "23:40", "endTimestamp": "23:46", "url": "https://youtu.be/XZ0PMRWXBEU?t=1420s", "text": "Another natural way of controlling this kind of editing process is through text."}, {"index": 237, "start": 1426.0, "end": 1434.0, "timestamp": "23:46", "endTimestamp": "23:54", "url": "https://youtu.be/XZ0PMRWXBEU?t=1426s", "text": "So instead of actually drawing what you want, you can ask the model, you can tell the model how you want your images to be edited."}, {"index": 238, "start": 1434.0, "end": 1441.0, "timestamp": "23:54", "endTimestamp": "24:01", "url": "https://youtu.be/XZ0PMRWXBEU?t=1434s", "text": "So you might start with an image of a bird, but now you want to change it so that you want it to spread the wings."}, {"index": 239, "start": 1441.0, "end": 1443.0, "timestamp": "24:01", "endTimestamp": "24:03", "url": "https://youtu.be/XZ0PMRWXBEU?t=1441s", "text": "And you can tell the model how to spread the wings."}, {"index": 240, "start": 1443.0, "end": 1446.0, "timestamp": "24:03", "endTimestamp": "24:06", "url": "https://youtu.be/XZ0PMRWXBEU?t=1443s", "text": "And it's able to do this kind of update."}, {"index": 241, "start": 1446.0, "end": 1449.0, "timestamp": "24:06", "endTimestamp": "24:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=1446s", "text": "Or you have an image with two birds and now you want the birds to be kissing."}, {"index": 242, "start": 1449.0, "end": 1452.0, "timestamp": "24:09", "endTimestamp": "24:12", "url": "https://youtu.be/XZ0PMRWXBEU?t=1449s", "text": "And then this is what you produce."}, {"index": 243, "start": 1452.0, "end": 1455.0, "timestamp": "24:12", "endTimestamp": "24:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=1452s", "text": "Or you have an image with a box and now you want the box to be open."}, {"index": 244, "start": 1455.0, "end": 1464.0, "timestamp": "24:15", "endTimestamp": "24:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=1455s", "text": "And you can kind of see some pretty impressive results in terms of image editing or changing the pose of this dog."}, {"index": 245, "start": 1464.0, "end": 1467.0, "timestamp": "24:24", "endTimestamp": "24:27", "url": "https://youtu.be/XZ0PMRWXBEU?t=1464s", "text": "Or even changing the style of the painting of the image."}, {"index": 246, "start": 1467.0, "end": 1472.0, "timestamp": "24:27", "endTimestamp": "24:32", "url": "https://youtu.be/XZ0PMRWXBEU?t=1467s", "text": "You go from a real image to some kind of like drawings."}, {"index": 247, "start": 1472.0, "end": 1474.0, "timestamp": "24:32", "endTimestamp": "24:34", "url": "https://youtu.be/XZ0PMRWXBEU?t=1472s", "text": "And again, it does a pretty good job."}, {"index": 248, "start": 1474.0, "end": 1476.0, "timestamp": "24:34", "endTimestamp": "24:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=1474s", "text": "You can see it's making some mistakes."}, {"index": 249, "start": 1476.0, "end": 1483.0, "timestamp": "24:36", "endTimestamp": "24:43", "url": "https://youtu.be/XZ0PMRWXBEU?t=1476s", "text": "Like this knife here gets changed in a way that is not quite what we want."}, {"index": 250, "start": 1483.0, "end": 1485.0, "timestamp": "24:43", "endTimestamp": "24:45", "url": "https://youtu.be/XZ0PMRWXBEU?t=1483s", "text": "They are not perfect yet."}, {"index": 251, "start": 1485.0, "end": 1487.0, "timestamp": "24:45", "endTimestamp": "24:47", "url": "https://youtu.be/XZ0PMRWXBEU?t=1485s", "text": "But these capabilities are very impressive."}, {"index": 252, "start": 1487.0, "end": 1488.0, "timestamp": "24:47", "endTimestamp": "24:48", "url": "https://youtu.be/XZ0PMRWXBEU?t=1487s", "text": "Already very useful."}, {"index": 253, "start": 1491.0, "end": 1492.0, "timestamp": "24:51", "endTimestamp": "24:52", "url": "https://youtu.be/XZ0PMRWXBEU?t=1491s", "text": "Cool."}, {"index": 254, "start": 1492.0, "end": 1498.0, "timestamp": "24:52", "endTimestamp": "24:58", "url": "https://youtu.be/XZ0PMRWXBEU?t=1492s", "text": "And yeah, back to the more exotic one that you might not necessarily think fits in this framework."}, {"index": 255, "start": 1498.0, "end": 1502.0, "timestamp": "24:58", "endTimestamp": "25:02", "url": "https://youtu.be/XZ0PMRWXBEU?t=1498s", "text": "Just to give you a sense of how general these ideas are."}, {"index": 256, "start": 1502.0, "end": 1512.0, "timestamp": "25:02", "endTimestamp": "25:12", "url": "https://youtu.be/XZ0PMRWXBEU?t=1502s", "text": "If you have a generative model of medical images, you can use it to essentially improve the way we do medical images."}, {"index": 257, "start": 1512.0, "end": 1518.0, "timestamp": "25:12", "endTimestamp": "25:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=1512s", "text": "In this case, the control signal, it's an actual measurement that you get from, let's say, a CT scan machine."}, {"index": 258, "start": 1518.0, "end": 1524.0, "timestamp": "25:18", "endTimestamp": "25:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=1518s", "text": "And then you can control the generative process using the measurement from the CT scan machine."}, {"index": 259, "start": 1524.0, "end": 1528.0, "timestamp": "25:24", "endTimestamp": "25:28", "url": "https://youtu.be/XZ0PMRWXBEU?t=1524s", "text": "And this can drastically reduce the amount of radiations."}, {"index": 260, "start": 1528.0, "end": 1534.0, "timestamp": "25:28", "endTimestamp": "25:34", "url": "https://youtu.be/XZ0PMRWXBEU?t=1528s", "text": "And the number of measurements that you need to get a crisp kind of image that you can show to the doctor."}, {"index": 261, "start": 1534.0, "end": 1536.0, "timestamp": "25:34", "endTimestamp": "25:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=1534s", "text": "This is very similar to in-painting."}, {"index": 262, "start": 1536.0, "end": 1538.0, "timestamp": "25:36", "endTimestamp": "25:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=1536s", "text": "It's just in-painting in a slightly different space."}, {"index": 263, "start": 1538.0, "end": 1540.0, "timestamp": "25:38", "endTimestamp": "25:40", "url": "https://youtu.be/XZ0PMRWXBEU?t=1538s", "text": "You can kind of get a sense."}, {"index": 264, "start": 1540.0, "end": 1542.0, "timestamp": "25:40", "endTimestamp": "25:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=1540s", "text": "It's roughly the same problem."}, {"index": 265, "start": 1542.0, "end": 1549.0, "timestamp": "25:42", "endTimestamp": "25:49", "url": "https://youtu.be/XZ0PMRWXBEU?t=1542s", "text": "And advances in generative models translate into big improvements in this real-world applications."}, {"index": 266, "start": 1549.0, "end": 1553.0, "timestamp": "25:49", "endTimestamp": "25:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=1549s", "text": "All right."}, {"index": 267, "start": 1553.0, "end": 1555.0, "timestamp": "25:53", "endTimestamp": "25:55", "url": "https://youtu.be/XZ0PMRWXBEU?t=1553s", "text": "Now, moving on to different modalities."}, {"index": 268, "start": 1555.0, "end": 1563.0, "timestamp": "25:55", "endTimestamp": "26:03", "url": "https://youtu.be/XZ0PMRWXBEU?t=1555s", "text": "Speech audio has been another modality where people have been able to build some pretty good generative models."}, {"index": 269, "start": 1563.0, "end": 1567.0, "timestamp": "26:03", "endTimestamp": "26:07", "url": "https://youtu.be/XZ0PMRWXBEU?t=1563s", "text": "This is one of the earliest ones."}, {"index": 270, "start": 1567.0, "end": 1570.0, "timestamp": "26:07", "endTimestamp": "26:10", "url": "https://youtu.be/XZ0PMRWXBEU?t=1567s", "text": "The WaveNet model back, I think it was 2016."}, {"index": 271, "start": 1570.0, "end": 1576.0, "timestamp": "26:10", "endTimestamp": "26:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=1570s", "text": "And you can kind of see some examples of, let's hope this works."}, {"index": 272, "start": 1576.0, "end": 1579.0, "timestamp": "26:16", "endTimestamp": "26:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=1576s", "text": "This is an example."}, {"index": 273, "start": 1582.0, "end": 1585.0, "timestamp": "26:22", "endTimestamp": "26:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=1582s", "text": "This is kind of like the pre-deep learning thing."}, {"index": 274, "start": 1585.0, "end": 1588.0, "timestamp": "26:25", "endTimestamp": "26:28", "url": "https://youtu.be/XZ0PMRWXBEU?t=1585s", "text": "And these are not great text-to-speech."}, {"index": 275, "start": 1588.0, "end": 1593.0, "timestamp": "26:28", "endTimestamp": "26:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=1588s", "text": "The Blue Lagoon is a 1980 American romance and adventure film directed by Randall Kleiser."}, {"index": 276, "start": 1593.0, "end": 1598.0, "timestamp": "26:33", "endTimestamp": "26:38", "url": "https://youtu.be/XZ0PMRWXBEU?t=1593s", "text": "And then the WaveNet model, which is a deep learning-based model for text-to-speech."}, {"index": 277, "start": 1598.0, "end": 1600.0, "timestamp": "26:38", "endTimestamp": "26:40", "url": "https://youtu.be/XZ0PMRWXBEU?t=1598s", "text": "You're going to see it's significantly better."}, {"index": 278, "start": 1600.0, "end": 1605.0, "timestamp": "26:40", "endTimestamp": "26:45", "url": "https://youtu.be/XZ0PMRWXBEU?t=1600s", "text": "The Blue Lagoon is a 1980 American romance and adventure film directed by Randall Kleiser."}, {"index": 279, "start": 1605.0, "end": 1612.0, "timestamp": "26:45", "endTimestamp": "26:52", "url": "https://youtu.be/XZ0PMRWXBEU?t=1605s", "text": "And these are maybe the latest ones that are based on diffusion models again."}, {"index": 280, "start": 1612.0, "end": 1617.0, "timestamp": "26:52", "endTimestamp": "26:57", "url": "https://youtu.be/XZ0PMRWXBEU?t=1612s", "text": "So this is, well, this is a combination of diffusion models and autoregressive models."}, {"index": 281, "start": 1617.0, "end": 1620.0, "timestamp": "26:57", "endTimestamp": "27:00", "url": "https://youtu.be/XZ0PMRWXBEU?t=1617s", "text": "But here you can see some of the 2023 stuff."}, {"index": 282, "start": 1620.0, "end": 1628.0, "timestamp": "27:00", "endTimestamp": "27:08", "url": "https://youtu.be/XZ0PMRWXBEU?t=1620s", "text": "Once you have the first token, you want to predict the second token given the input and the first token using multi-head attention."}, {"index": 283, "start": 1628.0, "end": 1631.0, "timestamp": "27:08", "endTimestamp": "27:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=1628s", "text": "You can see it's much more realistic."}, {"index": 284, "start": 1631.0, "end": 1634.0, "timestamp": "27:11", "endTimestamp": "27:14", "url": "https://youtu.be/XZ0PMRWXBEU?t=1631s", "text": "There is a little bit of an accent here."}, {"index": 285, "start": 1634.0, "end": 1641.0, "timestamp": "27:14", "endTimestamp": "27:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=1634s", "text": "There is a little bit of emotions that are, it feels a lot less robotic, a lot less fake."}, {"index": 286, "start": 1641.0, "end": 1643.0, "timestamp": "27:21", "endTimestamp": "27:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=1641s", "text": "Here's another example."}, {"index": 287, "start": 1643.0, "end": 1645.0, "timestamp": "27:23", "endTimestamp": "27:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=1643s", "text": "This is text-to-speech."}, {"index": 288, "start": 1645.0, "end": 1650.0, "timestamp": "27:25", "endTimestamp": "27:30", "url": "https://youtu.be/XZ0PMRWXBEU?t=1645s", "text": "You input a text and you produce the speech corresponding to that text."}, {"index": 289, "start": 1650.0, "end": 1653.0, "timestamp": "27:30", "endTimestamp": "27:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=1650s", "text": "CS-236 is the best class at Stanford."}, {"index": 290, "start": 1653.0, "end": 1656.0, "timestamp": "27:33", "endTimestamp": "27:36", "url": "https://youtu.be/XZ0PMRWXBEU?t=1653s", "text": "So this is another example."}, {"index": 291, "start": 1656.0, "end": 1662.0, "timestamp": "27:36", "endTimestamp": "27:42", "url": "https://youtu.be/XZ0PMRWXBEU?t=1656s", "text": "And again, you can sort of like use these things to solve inverse problems."}, {"index": 292, "start": 1662.0, "end": 1665.0, "timestamp": "27:42", "endTimestamp": "27:45", "url": "https://youtu.be/XZ0PMRWXBEU?t=1662s", "text": "So you can do super resolution in the audio space."}, {"index": 293, "start": 1665.0, "end": 1673.0, "timestamp": "27:45", "endTimestamp": "27:53", "url": "https://youtu.be/XZ0PMRWXBEU?t=1665s", "text": "So you can condition on the kind of like a low quality signal, the kind of thing you can get maybe on phones."}, {"index": 294, "start": 1673.0, "end": 1677.0, "timestamp": "27:53", "endTimestamp": "27:57", "url": "https://youtu.be/XZ0PMRWXBEU?t=1673s", "text": "One is investment, one is reform."}, {"index": 295, "start": 1677.0, "end": 1679.0, "timestamp": "27:57", "endTimestamp": "27:59", "url": "https://youtu.be/XZ0PMRWXBEU?t=1677s", "text": "And then you can super resolve it."}, {"index": 296, "start": 1679.0, "end": 1682.0, "timestamp": "27:59", "endTimestamp": "28:02", "url": "https://youtu.be/XZ0PMRWXBEU?t=1679s", "text": "One is investment, one is reform."}, {"index": 297, "start": 1682.0, "end": 1685.0, "timestamp": "28:02", "endTimestamp": "28:05", "url": "https://youtu.be/XZ0PMRWXBEU?t=1682s", "text": "Again, this is the same problem as basically in painting."}, {"index": 298, "start": 1685.0, "end": 1690.0, "timestamp": "28:05", "endTimestamp": "28:10", "url": "https://youtu.be/XZ0PMRWXBEU?t=1685s", "text": "Like you're missing some pixels, you're missing some frequencies, and you can ask the model to make them up for you."}, {"index": 299, "start": 1690.0, "end": 1698.0, "timestamp": "28:10", "endTimestamp": "28:18", "url": "https://youtu.be/XZ0PMRWXBEU?t=1690s", "text": "And to the extent that it understands the relationship between these values, which you can also kind of think of as images,"}, {"index": 300, "start": 1698.0, "end": 1701.0, "timestamp": "28:18", "endTimestamp": "28:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=1698s", "text": "it can do a pretty good job of super resolving audio."}, {"index": 301, "start": 1704.0, "end": 1713.0, "timestamp": "28:24", "endTimestamp": "28:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=1704s", "text": "Language, of course, that's another space where there's been a lot of progress and a lot of excitement around large language models."}, {"index": 302, "start": 1713.0, "end": 1723.0, "timestamp": "28:33", "endTimestamp": "28:43", "url": "https://youtu.be/XZ0PMRWXBEU?t=1713s", "text": "These are basically models that have been trained over large quantities of text collected on the internet often."}, {"index": 303, "start": 1723.0, "end": 1728.0, "timestamp": "28:43", "endTimestamp": "28:48", "url": "https://youtu.be/XZ0PMRWXBEU?t=1723s", "text": "And then they learn a probability distribution over which sentences make sense or not."}, {"index": 304, "start": 1728.0, "end": 1738.0, "timestamp": "28:48", "endTimestamp": "28:58", "url": "https://youtu.be/XZ0PMRWXBEU?t=1728s", "text": "And you can use it to, again, do some sort of in-painting where you can ask the model to create a sentence that starts with some kind of prompt."}, {"index": 305, "start": 1738.0, "end": 1751.0, "timestamp": "28:58", "endTimestamp": "29:11", "url": "https://youtu.be/XZ0PMRWXBEU?t=1738s", "text": "For example, this was an old language model, I guess in 2019, I think, where you can ask the model to continue a sentence that starts with"}, {"index": 306, "start": 1751.0, "end": 1754.0, "timestamp": "29:11", "endTimestamp": "29:14", "url": "https://youtu.be/XZ0PMRWXBEU?t=1751s", "text": "to get an A-plus in deep generative models."}, {"index": 307, "start": 1754.0, "end": 1756.0, "timestamp": "29:14", "endTimestamp": "29:16", "url": "https://youtu.be/XZ0PMRWXBEU?t=1754s", "text": "Students have to."}, {"index": 308, "start": 1756.0, "end": 1759.0, "timestamp": "29:16", "endTimestamp": "29:19", "url": "https://youtu.be/XZ0PMRWXBEU?t=1756s", "text": "And then let's see what the language model does."}, {"index": 309, "start": 1759.0, "end": 1761.0, "timestamp": "29:19", "endTimestamp": "29:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=1759s", "text": "And then it completes it for you, right?"}, {"index": 310, "start": 1761.0, "end": 1764.0, "timestamp": "29:21", "endTimestamp": "29:24", "url": "https://youtu.be/XZ0PMRWXBEU?t=1761s", "text": "And then it says, it's not so much reasonable."}, {"index": 311, "start": 1764.0, "end": 1768.0, "timestamp": "29:24", "endTimestamp": "29:28", "url": "https://youtu.be/XZ0PMRWXBEU?t=1764s", "text": "We have to be willing to work with problems that are all more interesting."}, {"index": 312, "start": 1768.0, "end": 1773.0, "timestamp": "29:28", "endTimestamp": "29:33", "url": "https://youtu.be/XZ0PMRWXBEU?t=1768s", "text": "The past, you know, not great, not perfect for today's standards."}, {"index": 313, "start": 1773.0, "end": 1783.0, "timestamp": "29:33", "endTimestamp": "29:43", "url": "https://youtu.be/XZ0PMRWXBEU?t=1773s", "text": "But again, for when this thing came out, it was pretty mind-blowing that you could build a model that can generate this quality of text."}, {"index": 314, "start": 1783.0, "end": 1788.0, "timestamp": "29:43", "endTimestamp": "29:48", "url": "https://youtu.be/XZ0PMRWXBEU?t=1783s", "text": "Now, I tried something similar on ChatGPT."}, {"index": 315, "start": 1788.0, "end": 1790.0, "timestamp": "29:48", "endTimestamp": "29:50", "url": "https://youtu.be/XZ0PMRWXBEU?t=1788s", "text": "And this time I tried something harder."}, {"index": 316, "start": 1790.0, "end": 1794.0, "timestamp": "29:50", "endTimestamp": "29:54", "url": "https://youtu.be/XZ0PMRWXBEU?t=1790s", "text": "Like here I said to get an A-plus in deep generative models."}, {"index": 317, "start": 1794.0, "end": 1799.0, "timestamp": "29:54", "endTimestamp": "29:59", "url": "https://youtu.be/XZ0PMRWXBEU?t=1794s", "text": "Here I tried what should I do to get an A-plus in CS236 at Stanford."}, {"index": 318, "start": 1799.0, "end": 1804.0, "timestamp": "29:59", "endTimestamp": "30:04", "url": "https://youtu.be/XZ0PMRWXBEU?t=1799s", "text": "So I didn't even tell the model ChatGPT what CS236 is."}, {"index": 319, "start": 1804.0, "end": 1809.0, "timestamp": "30:04", "endTimestamp": "30:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=1804s", "text": "It actually knows that CS236 is deep generative models."}, {"index": 320, "start": 1809.0, "end": 1814.0, "timestamp": "30:09", "endTimestamp": "30:14", "url": "https://youtu.be/XZ0PMRWXBEU?t=1809s", "text": "And here it gives you some actually pretty good tips on how to do well in the class."}, {"index": 321, "start": 1814.0, "end": 1821.0, "timestamp": "30:14", "endTimestamp": "30:21", "url": "https://youtu.be/XZ0PMRWXBEU?t=1814s", "text": "Attend lectures, read the materials, stay organized, seek help, do the homeworks."}, {"index": 322, "start": 1821.0, "end": 1823.0, "timestamp": "30:21", "endTimestamp": "30:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=1821s", "text": "Then it gives you 15 of them."}, {"index": 323, "start": 1823.0, "end": 1825.0, "timestamp": "30:23", "endTimestamp": "30:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=1823s", "text": "I cut the prompt here."}, {"index": 324, "start": 1825.0, "end": 1832.0, "timestamp": "30:25", "endTimestamp": "30:32", "url": "https://youtu.be/XZ0PMRWXBEU?t=1825s", "text": "But, you know, it's pretty impressive that you can do these kind of things."}, {"index": 325, "start": 1832.0, "end": 1837.0, "timestamp": "30:32", "endTimestamp": "30:37", "url": "https://youtu.be/XZ0PMRWXBEU?t=1832s", "text": "And again, it probably means that there is some level of understanding."}, {"index": 326, "start": 1837.0, "end": 1843.0, "timestamp": "30:37", "endTimestamp": "30:43", "url": "https://youtu.be/XZ0PMRWXBEU?t=1837s", "text": "And that's why these models are so powerful when people are using them for doing all sorts of things."}, {"index": 327, "start": 1843.0, "end": 1844.0, "timestamp": "30:43", "endTimestamp": "30:44", "url": "https://youtu.be/XZ0PMRWXBEU?t=1843s", "text": "Because they can generate."}, {"index": 328, "start": 1844.0, "end": 1846.0, "timestamp": "30:44", "endTimestamp": "30:46", "url": "https://youtu.be/XZ0PMRWXBEU?t=1844s", "text": "It means they understand something."}, {"index": 329, "start": 1846.0, "end": 1851.0, "timestamp": "30:46", "endTimestamp": "30:51", "url": "https://youtu.be/XZ0PMRWXBEU?t=1846s", "text": "And then you can use the knowledge to solve a variety of tasks that we care about."}, {"index": 330, "start": 1851.0, "end": 1862.0, "timestamp": "30:51", "endTimestamp": "31:02", "url": "https://youtu.be/XZ0PMRWXBEU?t=1851s", "text": "Of course, the nice thing about this space is that you can often mix and match."}, {"index": 331, "start": 1862.0, "end": 1869.0, "timestamp": "31:02", "endTimestamp": "31:09", "url": "https://youtu.be/XZ0PMRWXBEU?t=1862s", "text": "And so you can kind of control these models using various sorts of control signals."}, {"index": 332, "start": 1869.0, "end": 1875.0, "timestamp": "31:09", "endTimestamp": "31:15", "url": "https://youtu.be/XZ0PMRWXBEU?t=1869s", "text": "Once you can do generation, you can steer the generative process using different control signals."}, {"index": 333, "start": 1875.0, "end": 1883.0, "timestamp": "31:15", "endTimestamp": "31:23", "url": "https://youtu.be/XZ0PMRWXBEU?t=1875s", "text": "A natural one here would be generate text in English conditioned on some text in a different language."}, {"index": 334, "start": 1883.0, "end": 1885.0, "timestamp": "31:23", "endTimestamp": "31:25", "url": "https://youtu.be/XZ0PMRWXBEU?t=1883s", "text": "So maybe Chinese."}, {"index": 335, "start": 1885.0, "end": 1890.0, "timestamp": "31:25", "endTimestamp": "31:30", "url": "https://yo
